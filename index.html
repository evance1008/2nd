<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>ことだまリドル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ========== リセット & カスタムプロパティ ========== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --sumi:      #14151a;  /* 墨色(背景) */
      --washi:     #f3ead9;  /* 生成り/和紙色 */
      --shu:       #c8372e;  /* 朱色(正解) */
      --kogane:    #c9a227;  /* 黄金(位置違い) */
      --sumiNezumi:#6b6f76;  /* 墨鼠(不正解) */
    }

    /* ========== ベース ========== */
    html, body {
      height: 100%;
    }

    body {
      font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: var(--sumi);
      color: var(--washi);
      overflow: hidden;
    }

    /* ========== アプリシェル ========== */
    #app-shell {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========== ヘッダー ========== */
    header {
      width: 100%;
      text-align: center;
      padding: 28px 16px 22px;
      position: relative;
    }

    .title-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* 朱色の細線(上部装飾) */
    .title-rule {
      width: 48px;
      height: 1px;
      background: var(--shu);
      opacity: 0.7;
    }

    .title-kana {
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-weight: 800;
      font-size: clamp(1.9rem, 7.5vw, 2.5rem);
      letter-spacing: 0.22em;
      color: var(--washi);
      line-height: 1;
      text-indent: 0.22em; /* letter-spacing による右のズレ補正 */
    }

    .title-sub {
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      color: var(--sumiNezumi);
      text-indent: 0.28em;
    }

    /* ========== メインコンテンツ ========== */
    main {
      width: 100%;
      max-width: 480px;
      padding: 0 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* ========== 凡例 ========== */
    #legend {
      display: flex;
      gap: 14px;
      font-size: 0.72rem;
      color: var(--sumiNezumi);
      flex-wrap: wrap;
      justify-content: center;
      letter-spacing: 0.04em;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legend-swatch.correct  { background: var(--shu); }
    .legend-swatch.present  { background: var(--kogane); }
    .legend-swatch.absent   { background: var(--sumiNezumi); }

    /* ========== グリッド ========== */
    #grid-container {
      display: flex;
      flex-direction: column;
      gap: var(--gap, 7px);
    }

    .grid-row {
      display: flex;
      gap: var(--gap, 7px);
    }

    /* セル基本 */
    .cell {
      width: var(--cell-size, 56px);
      height: var(--cell-size, 56px);
      border: 1.5px solid rgba(243, 234, 217, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-size: calc(var(--cell-size, 56px) * 0.42);
      font-weight: 700;
      border-radius: 4px;
      background: transparent;
      color: var(--washi);
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* タイピング中(文字がある)セル */
    .cell.has-char {
      border-color: rgba(243, 234, 217, 0.32);
      background: rgba(243, 234, 217, 0.05);
    }

    /* アクティブ行 */
    .cell.active-row {
      border-color: rgba(243, 234, 217, 0.28);
    }

    /* 文字を擬似要素の手前に */
    .cell > span {
      position: relative;
      z-index: 1;
    }

    /* ===== 朱色・正解: 判を押す演出 ===== */
    .cell.correct {
      border-color: var(--shu);
      color: var(--washi);
      transition: none;
      animation: hankoPress 0.52s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    /* 朱印の広がり(墨汁がにじむように中心から外へ) */
    .cell.correct::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--shu);
      border-radius: 2px;
      transform: scale(0);
      transform-origin: center;
      animation: inkBleed 0.46s ease-out forwards;
      z-index: 0;
    }

    /* ===== 黄金・位置違い: 判を柔らかく押す演出 ===== */
    /* 正解より長い duration で同じ keyframe を使い、柔らかい圧を表現 */
    .cell.present {
      background: var(--kogane);
      border-color: var(--kogane);
      color: var(--sumi);
      animation: hankoPress 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    /* ===== 墨鼠・不正解 ===== */
    .cell.absent {
      background: rgba(107, 111, 118, 0.22);
      border-color: rgba(107, 111, 118, 0.38);
      color: rgba(243, 234, 217, 0.38);
    }

    /* ===== 判を押すアニメーション ===== */
    /* 圧縮 → 跳ね返り → 余韻 */
    @keyframes hankoPress {
      0%   { transform: scale(1); }
      16%  { transform: scale(0.86); }
      38%  { transform: scale(1.08); }
      58%  { transform: scale(0.96); }
      78%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    /* 朱印の広がり: 中心から外へにじみ出る */
    @keyframes inkBleed {
      0%   { transform: scale(0);    opacity: 1; }
      55%  { transform: scale(1.1);  opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }

    /* ===== 言霊が宿る - 段階的強度エフェクト ===== */
    /* CSS カスタムプロパティでスケール・透明度を調整し、同一 keyframe で三段階の強度を表現 */

    /* absent: 控えめ(不一致でも霊は微かに宿る) */
    .cell.kotodama-reveal::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(243, 234, 217, 0.1);
      pointer-events: none;
      z-index: 0;
      /* デフォルト変数(absent 基準) */
      --spirit-start: 0.55;
      --spirit-peak:  0.95;
      --spirit-peak-opacity: 0.28;
      animation: kotodamaSpirit 0.65s ease-out forwards;
    }

    /* present: 中程度 - 黄金の霊光が揺れながら宿る */
    .cell.present.kotodama-reveal::after {
      background: rgba(201, 162, 39, 0.45);
      animation-duration: 1.05s;
      --spirit-start: 0.40;
      --spirit-peak:  1.12;
      --spirit-peak-opacity: 0.72;
    }

    /* correct: 強 - 朱の霊光が力強く広がって宿る */
    .cell.correct.kotodama-reveal::after {
      background: rgba(243, 234, 217, 0.6);
      animation-duration: 1.42s;
      --spirit-start: 0.30;
      --spirit-peak:  1.28;
      --spirit-peak-opacity: 1.0;
    }

    @keyframes kotodamaSpirit {
      0%   { opacity: 0;                              transform: scale(var(--spirit-start, 0.45)); }
      25%  { opacity: var(--spirit-peak-opacity, 0.65); transform: scale(var(--spirit-peak, 1.0)); }
      100% { opacity: 0;                              transform: scale(var(--spirit-peak, 1.0)); }
    }

    /* ========== 入力エリア (アプリシェル最下部) ========== */
    #input-area {
      display: flex;
      gap: 10px;
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      background: var(--sumi);
      border-top: 1px solid rgba(243, 234, 217, 0.1);
      z-index: 100;
      width: 100%;
      flex-shrink: 0;
    }

    #guess-input {
      flex: 1;
      padding: 14px 14px;
      font-size: 1.22rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 500;
      background: rgba(243, 234, 217, 0.05);
      border: 1.5px solid rgba(243, 234, 217, 0.18);
      border-radius: 5px;
      color: var(--washi);
      outline: none;
      text-align: center;
      letter-spacing: 0.18em;
      transition: border-color 0.2s, background 0.2s;
      caret-color: var(--shu);
      min-width: 0;
    }

    #guess-input::placeholder {
      color: rgba(243, 234, 217, 0.22);
      letter-spacing: 0.04em;
      font-size: 0.9rem;
    }

    #guess-input:focus {
      border-color: rgba(243, 234, 217, 0.42);
      background: rgba(243, 234, 217, 0.07);
    }

    #guess-input:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #submit-btn {
      padding: 14px 20px;
      background: var(--shu);
      color: var(--washi);
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.12em;
      cursor: pointer;
      white-space: nowrap;
      min-width: 80px;
      transition: opacity 0.18s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    #submit-btn:hover:not(:disabled) {
      opacity: 0.82;
    }

    #submit-btn:active:not(:disabled) {
      transform: scale(0.94);
    }

    #submit-btn:disabled {
      background: rgba(107, 111, 118, 0.5);
      cursor: not-allowed;
    }

    /* ========== メッセージエリア ========== */
    #message-area {
      min-height: 36px;
      text-align: center;
      padding: 7px 18px;
      border-radius: 5px;
      width: 100%;
      max-width: 420px;
      line-height: 1.5;
      letter-spacing: 0.06em;
      font-size: 0.85rem;
    }

    #message-area.error {
      background: rgba(200, 55, 46, 0.12);
      color: #e8807a;
      border: 1px solid rgba(200, 55, 46, 0.28);
    }

    #message-area.info {
      background: rgba(243, 234, 217, 0.05);
      color: rgba(243, 234, 217, 0.55);
      border: 1px solid rgba(243, 234, 217, 0.1);
    }

    #message-area.success {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 1.02rem;
      font-weight: 700;
      background: rgba(200, 55, 46, 0.1);
      color: var(--washi);
      border: 1px solid rgba(200, 55, 46, 0.35);
    }

    #message-area.fail {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 0.97rem;
      font-weight: 700;
      background: rgba(107, 111, 118, 0.12);
      color: rgba(243, 234, 217, 0.65);
      border: 1px solid rgba(107, 111, 118, 0.28);
    }

    /* ========== ジャンルヒント ========== */
    #genre-hint {
      display: none;
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--sumiNezumi);
      padding: 5px 16px;
      border-radius: 4px;
      border: 1px dashed rgba(107, 111, 118, 0.28);
      background: rgba(107, 111, 118, 0.05);
      width: 100%;
      max-width: 420px;
    }

    #genre-hint.visible {
      display: block;
      animation: genreHintFadeIn 0.9s ease-out forwards;
    }

    @keyframes genreHintFadeIn {
      0%   { opacity: 0; transform: translateY(-4px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ========== フッター / リプレイ ========== */
    footer {
      padding-bottom: 44px;
    }

    #replay-btn {
      display: none;
      padding: 15px 44px;
      background: transparent;
      color: var(--washi);
      border: 1.5px solid rgba(243, 234, 217, 0.3);
      border-radius: 5px;
      font-size: 0.95rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.16em;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #replay-btn:hover {
      border-color: rgba(243, 234, 217, 0.6);
      background: rgba(243, 234, 217, 0.05);
    }

    #replay-btn:active {
      transform: scale(0.97);
    }

    /* ========== 完全正解 - 言霊解放エフェクト ========== */

    /* Phase 0: タイル行を横切る筆致ライン */
    @keyframes brushLineAnim {
      0%   { transform: scaleX(0); opacity: 1; }
      65%  { transform: scaleX(1); opacity: 1; }
      100% { transform: scaleX(1); opacity: 0; }
    }

    /* Phase 0: タイルフラッシュ */
    .cell.correct.perfect-tile-flash {
      animation: tilePerfectFlash 0.32s ease-out forwards;
    }

    @keyframes tilePerfectFlash {
      0%   { transform: scale(1); }
      42%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* Phase 1: 予備動作 — 印が小さく高い位置に浮いて出現 */
    @keyframes sealAnticipateAnim {
      0%   { opacity: 0; transform: translateY(-220px) scale(0.16); }
      55%  { opacity: 1; transform: translateY(-175px) scale(0.23); }
      100% { opacity: 1; transform: translateY(-168px) scale(0.22); }
    }

    /* Phase 1: 着地点に影が出現 */
    @keyframes shadowAppearAnim {
      0%   { opacity: 0; transform: scale(0.25); }
      100% { opacity: 0.32; transform: scale(1); }
    }

    /* Phase 2: 着地 — 一気に本来のサイズへ拡大→バウンス */
    @keyframes sealLandAnim {
      0%   { opacity: 1; transform: translateY(-168px) scale(0.22); }
      42%  { opacity: 1; transform: translateY(8px) scale(1.14); }
      63%  { opacity: 1; transform: translateY(-3px) scale(0.93); }
      82%  { opacity: 1; transform: translateY(0px) scale(1.04); }
      100% { opacity: 1; transform: translateY(0px) scale(1); }
    }

    /* Phase 2: 背景フラッシュ — 画面全体を朱/墨の放射状グラデーションで演出 */
    @keyframes bgFlashAnim {
      0%   { opacity: 0; transform: scale(0.1); }
      22%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1); }
    }

    /* Phase 2: 衝撃波 — 着地点から輪が広がる */
    @keyframes shockwaveAnim {
      0%   { opacity: 0.85; transform: scale(0.06); }
      100% { opacity: 0;    transform: scale(1); }
    }

    /* Phase 2: タイルから中央への筆致線 */
    @keyframes brushToCenterAnim {
      0%   { opacity: 1;    transform: scaleX(0); }
      52%  { opacity: 0.88; transform: scaleX(1); }
      100% { opacity: 0;    transform: scaleX(1); }
    }

    /* Phase 3: 朱肉の大きな滲み — 着地点からじわっと広がって落ち着く */
    @keyframes inkBleedLargeAnim {
      0%   { opacity: 0.52; transform: scale(0.04); }
      38%  { opacity: 0.22; transform: scale(0.55); }
      100% { opacity: 0;    transform: scale(1); }
    }

    /* Phase 3: 印フェードアウト */
    @keyframes sealFadeOutAnim {
      0%   { transform: scale(1);    opacity: 1; }
      100% { transform: scale(1.08); opacity: 0; }
    }

    /* ========== スタート画面 ========== */
    #start-screen {
      position: fixed;
      inset: 0;
      background: var(--sumi);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .start-screen-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      width: 100%;
      max-width: 360px;
    }

    .start-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
    }

    .start-label {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-indent: 0.2em;
      color: var(--sumiNezumi);
    }

    #length-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .length-btn {
      flex: 1;
      min-width: 68px;
      max-width: 96px;
      padding: 14px 8px;
      background: transparent;
      color: rgba(243, 234, 217, 0.5);
      border: 1.5px solid rgba(243, 234, 217, 0.18);
      border-radius: 5px;
      font-size: 0.88rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s, color 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .length-btn:hover:not(.selected) {
      border-color: rgba(243, 234, 217, 0.38);
      color: var(--washi);
      background: rgba(243, 234, 217, 0.04);
    }

    .length-btn.selected {
      background: rgba(200, 55, 46, 0.18);
      border-color: var(--shu);
      color: var(--washi);
    }

    #game-start-btn {
      width: 100%;
      max-width: 220px;
      padding: 16px 32px;
      background: var(--shu);
      color: var(--washi);
      border: none;
      border-radius: 5px;
      font-size: 1.05rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-indent: 0.22em;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    #game-start-btn:hover {
      opacity: 0.82;
    }

    #game-start-btn:active {
      transform: scale(0.94);
    }

    #test-start-btn {
      width: 100%;
      max-width: 220px;
      padding: 11px 24px;
      background: transparent;
      color: var(--kogane);
      border: 1.5px solid rgba(201, 162, 39, 0.45);
      border-radius: 5px;
      font-size: 0.85rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s, opacity 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    #test-start-btn:hover {
      border-color: var(--kogane);
      background: rgba(201, 162, 39, 0.07);
    }

    #test-start-btn:active {
      transform: scale(0.94);
    }

    /* ========== テストモード中バナー ========== */
    #test-mode-banner {
      display: none;
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 7px 16px;
      border-radius: 4px;
      background: rgba(201, 162, 39, 0.12);
      border: 1px solid rgba(201, 162, 39, 0.38);
      color: var(--kogane);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
    }

    #test-mode-banner.visible {
      display: block;
    }
  </style>
</head>
<body>

  <div id="app-shell">
    <div id="scroll-area">
      <header>
        <div class="title-wrap">
          <div class="title-rule"></div>
          <h1 class="title-kana">ことだまリドル</h1>
          <p class="title-sub">言葉に宿る霊力を解き明かせ</p>
          <div class="title-rule"></div>
        </div>
      </header>

      <main>
        <div id="legend">
          <div class="legend-item">
            <div class="legend-swatch correct"></div>
            <span>位置も文字も正解</span>
          </div>
          <div class="legend-item">
            <div class="legend-swatch present"></div>
            <span>文字はあるが位置が違う</span>
          </div>
          <div class="legend-item">
            <div class="legend-swatch absent"></div>
            <span>含まれない文字</span>
          </div>
        </div>

        <div id="test-mode-banner">テストモード中 — スコアは記録されません</div>

        <div id="message-area"></div>

        <div id="genre-hint"></div>

        <div id="grid-container"></div>
      </main>

      <footer>
        <button id="replay-btn">再び唱える</button>
      </footer>
    </div>

    <div id="input-area">
      <input
        type="text"
        id="guess-input"
        placeholder="ひらがなで入力"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <button id="submit-btn">唱える</button>
    </div>
  </div>

  <!-- スタート画面 -->
  <div id="start-screen">
    <div class="start-screen-inner">
      <div class="title-wrap">
        <div class="title-rule"></div>
        <h1 class="title-kana">ことだまリドル</h1>
        <p class="title-sub">言葉に宿る霊力を解き明かせ</p>
        <div class="title-rule"></div>
      </div>
      <div class="start-section">
        <p class="start-label">遊ぶ文字数</p>
        <div id="length-btns">

      "ほうれんそう": { "length": 6, "genre": "やさい・くだもの" },
      "かたつむり": { "length": 5, "genre": "どうぶつ" }
    };

    // ===== ゲーム状態 =====
    let targetWord    = "";
    let wordLength    = 0;
    let maxAttempts   = 0;
    let currentAttempt = 0;
    let gameOver        = false;
    let lastWord        = "";
    let currentGenre    = "";
    let genreHintShown  = false;
    let selectedLength  = 0; // 0 = おまかせ、4/5/6 = 指定文字数
    let isTestMode      = false;

    // ===== DOM =====
    const gridContainer = document.getElementById("grid-container");
    const guessInput    = document.getElementById("guess-input");
    const submitBtn     = document.getElementById("submit-btn");
    const messageArea   = document.getElementById("message-area");
    const replayBtn     = document.getElementById("replay-btn");
    const genreHintEl   = document.getElementById("genre-hint");
    const startScreen    = document.getElementById("start-screen");
    const gameStartBtn   = document.getElementById("game-start-btn");
    const testStartBtn   = document.getElementById("test-start-btn");
    const testModeBanner = document.getElementById("test-mode-banner");
    const lengthBtns     = document.querySelectorAll(".length-btn");

    // ===== ユーティリティ =====
    function isHiragana(str) {
      return /^[ぁ-ゖー]+$/.test(str);
    }

    function isInWordList(word) {
      return word in WORDS_WITH_GENRE;
    }

    function pickWord() {
      let pool;
      if (selectedLength && [4, 5, 6].includes(selectedLength)) {
        pool = Object.keys(WORDS_WITH_GENRE).filter(
          w => WORDS_WITH_GENRE[w].length === selectedLength && w !== lastWord
        );
      } else {
        pool = Object.keys(WORDS_WITH_GENRE).filter(w => w !== lastWord);
      }
      return pool[Math.floor(Math.random() * pool.length)];
    }

    // ===== グリッド =====
    let gridCells = [];

    function buildGrid() {
      // セルサイズをレスポンシブに決定
      const gap       = 7;
      const padding   = 32;
      const maxCell   = 58;
      const available = Math.min(window.innerWidth - padding, 448 - padding);
      const totalGap  = gap * (wordLength - 1);
      const cellSize  = Math.min(maxCell, Math.floor((available - totalGap) / wordLength));

      gridContainer.style.setProperty("--cell-size", cellSize + "px");
      gridContainer.style.setProperty("--gap", gap + "px");

      gridContainer.innerHTML = "";
      gridCells = [];

      for (let r = 0; r < maxAttempts; r++) {
        const row = document.createElement("div");
        row.classList.add("grid-row");
        const cells = [];
        for (let c = 0; c < wordLength; c++) {
          const cell = document.createElement("div");
          cell.classList.add("cell");
          row.appendChild(cell);
          cells.push(cell);
        }
        gridContainer.appendChild(row);
        gridCells.push(cells);
      }
      setActiveRow(0);
    }

    function setActiveRow(rowIndex) {
      gridCells.forEach((cells, r) => {
        cells.forEach(cell => {
          cell.classList.toggle("active-row", r === rowIndex);
        });
      });
    }

    // ===== 判定ロジック(標準Wordleアルゴリズム) =====
    function evaluate(guess, target) {
      const result      = new Array(wordLength).fill("absent");
      const targetUsed  = new Array(wordLength).fill(false);
      const guessUsed   = new Array(wordLength).fill(false);

      for (let i = 0; i < wordLength; i++) {
        if (guess[i] === target[i]) {
          result[i]     = "correct";
          targetUsed[i] = true;
          guessUsed[i]  = true;
        }
      }

      for (let i = 0; i < wordLength; i++) {
        if (guessUsed[i]) continue;
        for (let j = 0; j < wordLength; j++) {
          if (targetUsed[j]) continue;
          if (guess[i] === target[j]) {
            result[i]     = "present";
            targetUsed[j] = true;
            break;
          }
        }
      }

      return result;
    }

    // ===== セルに色付け(判を押す演出) =====
    function colorRow(rowIndex, guess, result) {
      const cells = gridCells[rowIndex];
      for (let i = 0; i < wordLength; i++) {
        const cell = cells[i];
        cell.innerHTML = `<span>${guess[i]}</span>`;
        cell.classList.remove("active-row", "has-char");

        // 1文字ずつ時間差で印を押す
        const delay = i * 130;
        setTimeout(() => {
          cell.classList.add(result[i]);
          cell.classList.add("kotodama-reveal");
        }, delay);
      }
    }

    // ===== ライブプレビュー(タイピング中にグリッドへ反映) =====
    function updatePreview() {
      if (gameOver) return;
      const val   = guessInput.value;
      const cells = gridCells[currentAttempt];
      if (!cells) return;

      for (let i = 0; i < wordLength; i++) {
        const char = val[i] || "";
        if (char) {
          cells[i].innerHTML = `<span>${char}</span>`;
          cells[i].classList.add("has-char");
        } else {
          cells[i].innerHTML = "";
          cells[i].classList.remove("has-char");
        }
      }
    }

    // ===== メッセージ =====
    function showMessage(text, type) {
      messageArea.textContent = text;
      messageArea.className   = type || "";
    }

    // ===== ジャンルヒント表示 =====
    function showGenreHint() {
      genreHintEl.textContent = `ジャンル：${currentGenre}`;
      genreHintEl.classList.remove("visible");
      // リフロー強制で再アニメーション保証
      void genreHintEl.offsetWidth;
      genreHintEl.classList.add("visible");
    }

    // ===== 完全正解エフェクト: 言霊解放 =====
    function triggerPerfectEffect(word, onComplete) {
      const lastRowIdx = currentAttempt - 1;
      const rowCells   = gridCells[lastRowIdx];
      const firstRect  = rowCells[0].getBoundingClientRect();
      const lastRect   = rowCells[wordLength - 1].getBoundingClientRect();
      const rowLeft    = firstRect.left;
      const rowWidth   = lastRect.right - rowLeft;
      const rowCenterY = firstRect.top + firstRect.height / 2;
      const screenCx   = window.innerWidth  / 2;
      const screenCy   = window.innerHeight / 2;
      const sealSize   = Math.round(Math.min(window.innerWidth * 0.55, window.innerHeight * 0.44, 280));

      // Phase 0: タイルフラッシュ + 行を横切る筆致ライン
      const sweepMs = 260;
      rowCells.forEach((cell, i) => {
        const d = wordLength <= 1 ? 0 : (i / (wordLength - 1)) * sweepMs;
        setTimeout(() => cell.classList.add('perfect-tile-flash'), d);
      });

      const brushLine = document.createElement('div');
      Object.assign(brushLine.style, {
        position:        'fixed',
        left:            rowLeft + 'px',
        top:             (rowCenterY - 3) + 'px',
        width:           rowWidth + 'px',
        height:          '6px',
        background:      'linear-gradient(90deg, transparent 0%, var(--shu) 20%, var(--kogane) 60%, transparent 100%)',
        borderRadius:    '3px',
        pointerEvents:   'none',
        zIndex:          '998',
        transformOrigin: 'left center',
        animation:       'brushLineAnim 0.42s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards',
      });
      document.body.appendChild(brushLine);
      setTimeout(() => brushLine.remove(), 500);

      // Phase 1: 予備動作 — 印が小さく浮いて出現
      const seal = document.createElement('div');
      Object.assign(seal.style, {
        position:        'fixed',
        left:            (screenCx - sealSize / 2) + 'px',
        top:             (screenCy - sealSize / 2) + 'px',
        width:           sealSize + 'px',
        height:          sealSize + 'px',
        background:      'var(--shu)',
        borderRadius:    Math.round(sealSize * 0.08) + 'px',
        outline:         '3px solid var(--kogane)',
        outlineOffset:   '5px',
        pointerEvents:   'none',
        zIndex:          '999',
        transformOrigin: 'center',
        animation:       'sealAnticipateAnim 0.28s cubic-bezier(0.25, 0.1, 0.25, 1) forwards',
      });
      document.body.appendChild(seal);

      // 影: 着地点の下に楕円の影が出現
      const shadowW = Math.round(sealSize * 0.7);
      const shadowH = Math.round(sealSize * 0.08);
      const shadow  = document.createElement('div');
      Object.assign(shadow.style, {
        position:        'fixed',
        left:            (screenCx - shadowW / 2) + 'px',
        top:             (screenCy + Math.round(sealSize * 0.38)) + 'px',
        width:           shadowW + 'px',
        height:          shadowH + 'px',
        background:      'var(--shu)',
        borderRadius:    '50%',
        pointerEvents:   'none',
        zIndex:          '996',
        transformOrigin: 'center',
        animation:       'shadowAppearAnim 0.28s ease-out forwards',
      });
      document.body.appendChild(shadow);

      // Phase 2: 着地 (280ms後)
      setTimeout(() => {
        // 影を消す
        shadow.style.transition = 'opacity 0.06s ease-in';
        shadow.style.opacity    = '0';
        setTimeout(() => shadow.remove(), 120);

        // 印を着地
        seal.style.animation = 'sealLandAnim 0.46s cubic-bezier(0.22, 0.61, 0.36, 1) forwards';

        // 背景フラッシュ: 画面全体を朱/墨の放射状グラデーションで演出
        const bgDim   = Math.max(window.innerWidth, window.innerHeight) * 2.5;
        const bgFlash = document.createElement('div');
        Object.assign(bgFlash.style, {
          position:        'fixed',
          left:            (screenCx - bgDim / 2) + 'px',
          top:             (screenCy - bgDim / 2) + 'px',
          width:           bgDim + 'px',
          height:          bgDim + 'px',
          background:      'radial-gradient(circle at center, rgba(200,55,46,0.36) 0%, rgba(20,21,26,0.80) 48%, transparent 70%)',
          borderRadius:    '50%',
          pointerEvents:   'none',
          zIndex:          '993',
          transformOrigin: 'center',
          animation:       'bgFlashAnim 0.72s cubic-bezier(0.15, 0.8, 0.35, 1) forwards',
        });
        document.body.appendChild(bgFlash);
        setTimeout(() => bgFlash.remove(), 780);

        // 衝撃波 1: 着地点から広がる輪
        const sw1Dim = sealSize * 2.6;
        const sw1    = document.createElement('div');
        Object.assign(sw1.style, {
          position:        'fixed',
          left:            (screenCx - sw1Dim / 2) + 'px',
          top:             (screenCy - sw1Dim / 2) + 'px',
          width:           sw1Dim + 'px',
          height:          sw1Dim + 'px',
          borderRadius:    '50%',
          border:          '3px solid var(--shu)',
          pointerEvents:   'none',
          zIndex:          '997',
          transformOrigin: 'center',
          animation:       'shockwaveAnim 0.52s ease-out forwards',
        });
        document.body.appendChild(sw1);
        setTimeout(() => sw1.remove(), 580);

        // 衝撃波 2: やや遅れて、より大きく広がる
        setTimeout(() => {
          const sw2Dim = sealSize * 4.8;
          const sw2    = document.createElement('div');
          Object.assign(sw2.style, {
            position:        'fixed',
            left:            (screenCx - sw2Dim / 2) + 'px',
            top:             (screenCy - sw2Dim / 2) + 'px',
            width:           sw2Dim + 'px',
            height:          sw2Dim + 'px',
            borderRadius:    '50%',
            border:          '2px solid rgba(200,55,46,0.5)',
            pointerEvents:   'none',
            zIndex:          '997',
            transformOrigin: 'center',
            animation:       'shockwaveAnim 0.68s ease-out forwards',
          });
          document.body.appendChild(sw2);
          setTimeout(() => sw2.remove(), 730);
        }, 90);

        // タイルから中央への筆致線
        rowCells.forEach((cell, i) => {
          const rect   = cell.getBoundingClientRect();
          const cellCx = rect.left + rect.width  / 2;
          const cellCy = rect.top  + rect.height / 2;
          const dx     = screenCx - cellCx;
          const dy     = screenCy - cellCy;
          const dist   = Math.sqrt(dx * dx + dy * dy);
          const angle  = Math.atan2(dy, dx) * 180 / Math.PI;
          const delay  = i * 28;

          const lineWrap = document.createElement('div');
          Object.assign(lineWrap.style, {
            position:        'fixed',
            left:            cellCx + 'px',
            top:             (cellCy - 1.5) + 'px',
            width:           dist + 'px',
            height:          '3px',
            transformOrigin: 'left center',
            transform:       'rotate(' + angle + 'deg)',
            pointerEvents:   'none',
            zIndex:          '994',
          });

          const lineEl = document.createElement('div');
          Object.assign(lineEl.style, {
            width:           '100%',
            height:          '100%',
            background:      'linear-gradient(90deg, rgba(200,55,46,0.92) 0%, rgba(200,55,46,0.12) 100%)',
            borderRadius:    '1.5px',
            transformOrigin: 'left center',
            animation:       'brushToCenterAnim 0.4s ease-in ' + delay + 'ms forwards',
          });
          lineWrap.appendChild(lineEl);
          document.body.appendChild(lineWrap);
          setTimeout(() => lineWrap.remove(), 480 + delay);
        });

      }, 280);

      // Phase 3: 余韻 (560ms後)
      setTimeout(() => {
        // 朱肉の大きな滲み
        const bleedDim = Math.max(window.innerWidth, window.innerHeight) * 1.5;
        const bleed    = document.createElement('div');
        Object.assign(bleed.style, {
          position:        'fixed',
          left:            (screenCx - bleedDim / 2) + 'px',
          top:             (screenCy - bleedDim / 2) + 'px',
          width:           bleedDim + 'px',
          height:          bleedDim + 'px',
          background:      'var(--shu)',
          borderRadius:    '50%',
          pointerEvents:   'none',
          zIndex:          '992',
          transformOrigin: 'center',
          animation:       'inkBleedLargeAnim 0.78s ease-out forwards',
        });
        document.body.appendChild(bleed);
        setTimeout(() => bleed.remove(), 840);

        // 印フェードアウト: 着地完了後 (740ms=280+460) に開始
        setTimeout(() => {
          seal.style.animation = 'sealFadeOutAnim 0.32s ease-in forwards';
          setTimeout(() => seal.remove(), 380);
        }, 200);
      }, 560);

      setTimeout(onComplete, 1350);
    }

    // ===== 推測処理 =====
    function submitGuess() {
      if (gameOver) return;

      const guess = guessInput.value.trim();
      guessInput.value = "";
      updatePreview();

      if (guess.length !== wordLength) {
        showMessage(`${wordLength}文字で入力してください。（現在 ${guess.length} 文字）`, "error");
        guessInput.focus();
        return;
      }

      if (!isHiragana(guess)) {
        showMessage("ひらがなのみで入力してください。", "error");
        guessInput.focus();
        return;
      }

      // テストモード: 1回目の回答は必ず全正解として判定
      const result = (isTestMode && currentAttempt === 0)
        ? new Array(wordLength).fill("correct")
        : evaluate(guess, targetWord);
      colorRow(currentAttempt, guess, result);
      currentAttempt++;

      const revealEnd = (wordLength - 1) * 130 + 300;

      if (result.every(r => r === "correct")) {
        gameOver = true;
        const tries = currentAttempt;
        setTimeout(() => {
          triggerPerfectEffect(targetWord, () => {
            showMessage(`霊力を解き明かした！「${targetWord}」を ${tries} 回で見抜いた。`, "success");
            endGame();
          });
        }, revealEnd);
        return;
      }

      if (currentAttempt >= maxAttempts) {
        gameOver = true;
        setTimeout(() => {
          showMessage(`言霊が逃げた……正解は「${targetWord}」。`, "fail");
          endGame();
        }, revealEnd);
        return;
      }

      setActiveRow(currentAttempt);
      const remaining = maxAttempts - currentAttempt;
      showMessage(`残り ${remaining} 回`, "info");

      // 試行回数が最大の半分に達した時点でジャンルヒントを1回だけ表示
      if (!genreHintShown && currentAttempt === Math.ceil(maxAttempts / 2)) {
        genreHintShown = true;
        setTimeout(() => showGenreHint(), revealEnd);
      }

      guessInput.focus();
    }

    // ===== ゲーム終了 =====
    function endGame() {
      submitBtn.disabled      = true;
      guessInput.disabled     = true;
      replayBtn.style.display = "inline-block";
      lastWord = targetWord;
    }

    // ===== ゲーム開始 =====
    function startGame(testMode = false) {
      isTestMode      = testMode;
      targetWord      = pickWord();
      wordLength      = WORDS_WITH_GENRE[targetWord].length;
      currentGenre    = WORDS_WITH_GENRE[targetWord].genre;
      maxAttempts     = wordLength + 7;
      currentAttempt  = 0;
      gameOver        = false;

      genreHintShown  = false;
      genreHintEl.textContent = "";
      genreHintEl.classList.remove("visible");

      guessInput.disabled     = false;
      guessInput.value        = "";
      submitBtn.disabled      = false;
      replayBtn.style.display = "none";

      if (isTestMode) {
        testModeBanner.classList.add("visible");
      } else {
        testModeBanner.classList.remove("visible");
      }

      buildGrid();
      showMessage(`${wordLength}文字の言霊を当てよ。（最大 ${maxAttempts} 回）`, "info");
      guessInput.focus();
    }

    // ===== スタート画面 =====
    function showStartScreen() {
      startScreen.style.display = "flex";
    }

    function hideStartScreen() {
      startScreen.style.display = "none";
    }

    lengthBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        lengthBtns.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedLength = parseInt(btn.dataset.length);
      });
    });

    gameStartBtn.addEventListener("click", () => {
      hideStartScreen();
      startGame(false);
    });

    testStartBtn.addEventListener("click", () => {
      hideStartScreen();
      startGame(true);
    });

    // ===== イベント =====
    submitBtn.addEventListener("click", submitGuess);

    guessInput.addEventListener("input", updatePreview);

    guessInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        submitGuess();
      }
    });

    replayBtn.addEventListener("click", showStartScreen);

    // ===== 初回起動 =====
    showStartScreen();

    // ===== キーボード表示時にアプリシェルをビジュアルビューポートに追従 (iOS対応) =====
    const appShell = document.getElementById("app-shell");

    function adjustForKeyboard() {
      if (!window.visualViewport) return;
      const vv = window.visualViewport;
      appShell.style.height = vv.height + "px";
      appShell.style.top = (vv.offsetTop || 0) + "px";
    }

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", adjustForKeyboard);
      window.visualViewport.addEventListener("scroll", adjustForKeyboard);
    }
    adjustForKeyboard();

    // キーボード表示後にアクティブ行をスクロールで見えるようにする
    guessInput.addEventListener("focus", () => {
      setTimeout(() => {
        if (gridCells[currentAttempt]) {
          gridCells[currentAttempt][0].scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }, 350);
    });
  </script>
</body>
</html>
