<!DOCTYPE html>
<!--
  ===== HTML 目次 =====
  SECTION: メインゲームエリア
  SECTION: フッター・リプレイ
  SECTION: 入力エリア
  SECTION: 結果発表オーバーレイ
  SECTION: スタート画面
  SECTION: 一覧画面
  =====
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>ひらがな和ーどる</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /*
     * ===== CSS 目次 =====
     * SECTION: リセット・カスタムプロパティ
     * SECTION: ベース・レイアウト
     * SECTION: アプリシェル
     * SECTION: ヘッダー
     * SECTION: メインコンテンツ
     * SECTION: 凡例
     * SECTION: グリッド・セル
     * SECTION: 入力エリア
     * SECTION: メッセージエリア
     * SECTION: ジャンルヒント
     * SECTION: フッター・リプレイ
     * SECTION: 完全正解エフェクト
     * SECTION: 結果発表オーバーレイ
     * SECTION: スタート画面
     * SECTION: テストモードバナー
     * SECTION: 一覧画面
     * =====
     */

    /* ===== SECTION: リセット・カスタムプロパティ ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --washi:     #FAF7F0;  /* 生成り/和紙色(背景) */
      --sumi:      #333333;  /* 墨色(基本テキスト・枠線) */
      --aka:       #1F3864;  /* 紺(アクセント統一色・旧:赤) */
      --midori:    #1F3864;  /* 紺(位置も文字も正解・旧:緑) */
      --kiiro:     #E8B93F;  /* 黄(文字のみ正解) */
      --sumiNezumi:#6E6E6E;  /* ニュートラルグレー(補助テキスト) */
    }

    /* ===== SECTION: ベース・レイアウト ===== */
    html, body {
      height: 100%;
    }

    body {
      font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: var(--washi);
      color: var(--sumi);
      overflow: hidden;
    }

    /* ===== SECTION: アプリシェル ===== */
    #app-shell {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #scroll-area {
      position: relative; /* 完全正解エフェクト(筆致)の座標基準にする */
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 28px; /* ヘッダー削除分の上部余白を確保 */
    }

    /* ===== SECTION: ヘッダー ===== */
    header {
      width: 100%;
      text-align: center;
      padding: 28px 16px 22px;
      position: relative;
    }

    .title-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* 紺色の細線(上部装飾) */
    .title-rule {
      width: 48px;
      height: 1px;
      background: var(--aka);
      opacity: 0.7;
    }

    .title-kana {
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-weight: 800;
      font-size: clamp(1.9rem, 7.5vw, 2.5rem);
      letter-spacing: 0.22em;
      /* 紺→黄へのグラデーションで賑やかな配色にする */
      background: linear-gradient(180deg, var(--aka) 0%, var(--aka) 62%, var(--kiiro) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 1px 12px rgba(31, 56, 100, 0.18);
      line-height: 1;
      text-indent: 0.22em; /* letter-spacing による右のズレ補正 */
    }

    /* ===== SECTION: メインコンテンツ ===== */
    main {
      width: 100%;
      max-width: 480px;
      padding: 0 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* ===== SECTION: 凡例 ===== */
    #legend {
      display: flex;
      gap: 14px;
      font-size: 0.72rem;
      color: var(--sumiNezumi);
      flex-wrap: nowrap;
      justify-content: center;
      letter-spacing: 0.04em;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    /* 横幅が足りない画面では中途半端な折り返しを避け、縦1列に並べる */
    @media (max-width: 460px) {
      #legend {
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
    }

    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legend-swatch.correct  { background: var(--midori); }
    .legend-swatch.present  { background: var(--kiiro); }
    .legend-swatch.absent   { background: #B8B8B8; }

    /* ===== SECTION: グリッド・セル ===== */
    #grid-container {
      display: flex;
      flex-direction: column;
      gap: var(--gap, 7px);
    }

    .grid-row {
      display: flex;
      gap: var(--gap, 7px);
    }

    /* セル基本 */
    .cell {
      width: var(--cell-size, 56px);
      height: var(--cell-size, 56px);
      border: 1.5px solid rgba(51, 51, 51, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-size: calc(var(--cell-size, 56px) * 0.42);
      font-weight: 700;
      border-radius: 4px;
      background: transparent;
      color: var(--sumi);
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* タイピング中(文字がある)セル */
    .cell.has-char {
      border-color: rgba(51, 51, 51, 0.34);
      background: rgba(51, 51, 51, 0.05);
    }

    /* アクティブ行 */
    .cell.active-row {
      border-color: rgba(51, 51, 51, 0.3);
    }

    /* 文字を擬似要素の手前に */
    .cell > span {
      position: relative;
      z-index: 1;
    }

    /* --- サブ: 緑・正解（判を押す演出） --- */
    .cell.correct {
      border-color: var(--midori);
      color: var(--washi);
      transition: none;
      animation: hankoPress 0.52s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    /* 緑印の広がり(墨汁がにじむように中心から外へ) */
    .cell.correct::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--midori);
      border-radius: 2px;
      transform: scale(0);
      transform-origin: center;
      animation: inkBleed 0.46s ease-out forwards;
      z-index: 0;
    }

    /* --- サブ: 黄色・位置違い（判を柔らかく押す演出） --- */
    /* 正解より長い duration で同じ keyframe を使い、柔らかい圧を表現 */
    .cell.present {
      background: var(--kiiro);
      border-color: var(--kiiro);
      color: var(--sumi);
      animation: hankoPress 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    /* --- サブ: ニュートラルグレー・不正解 --- */
    .cell.absent {
      background: rgba(184, 184, 184, 0.32);
      border-color: rgba(184, 184, 184, 0.55);
      color: rgba(51, 51, 51, 0.45);
    }

    /* --- サブ: アニメーション（判を押す） --- */
    /* 圧縮 → 跳ね返り → 余韻 */
    @keyframes hankoPress {
      0%   { transform: scale(1); }
      16%  { transform: scale(0.86); }
      38%  { transform: scale(1.08); }
      58%  { transform: scale(0.96); }
      78%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    /* 朱印の広がり: 中心から外へにじみ出る */
    @keyframes inkBleed {
      0%   { transform: scale(0);    opacity: 1; }
      55%  { transform: scale(1.1);  opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }

    /* ===== SECTION: 入力エリア ===== */
    #input-area {
      display: flex;
      gap: 10px;
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      background: var(--washi);
      border-top: 1px solid rgba(51, 51, 51, 0.14);
      z-index: 100;
      width: 100%;
      flex-shrink: 0;
    }

    #guess-input {
      flex: 1;
      padding: 14px 14px;
      font-size: 1.22rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 500;
      background: rgba(51, 51, 51, 0.04);
      border: 1.5px solid rgba(51, 51, 51, 0.2);
      border-radius: 5px;
      color: var(--sumi);
      outline: none;
      text-align: center;
      letter-spacing: 0.18em;
      transition: border-color 0.2s, background 0.2s;
      caret-color: var(--aka);
      min-width: 0;
    }

    #guess-input::placeholder {
      color: rgba(51, 51, 51, 0.38);
      letter-spacing: 0.04em;
      font-size: 0.9rem;
    }

    #guess-input:focus {
      border-color: rgba(51, 51, 51, 0.45);
      background: rgba(51, 51, 51, 0.06);
    }

    #guess-input:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #submit-btn {
      padding: 14px 20px;
      background: var(--aka);
      color: var(--washi);
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.12em;
      cursor: pointer;
      white-space: nowrap;
      min-width: 80px;
      transition: opacity 0.18s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    #submit-btn:hover:not(:disabled) {
      opacity: 0.82;
    }

    #submit-btn:active:not(:disabled) {
      transform: scale(0.94);
    }

    #submit-btn:disabled {
      background: rgba(184, 184, 184, 0.55);
      cursor: not-allowed;
    }

    /* ===== SECTION: メッセージエリア ===== */
    #message-area {
      min-height: 36px;
      text-align: center;
      padding: 7px 18px;
      border-radius: 5px;
      width: 100%;
      max-width: 420px;
      line-height: 1.5;
      letter-spacing: 0.06em;
      font-size: 0.85rem;
    }

    #message-area.error {
      background: rgba(179, 39, 31, 0.08);
      color: #A3281F;
      border: 1px solid rgba(179, 39, 31, 0.3);
    }

    #message-area.info {
      background: rgba(51, 51, 51, 0.04);
      color: rgba(51, 51, 51, 0.65);
      border: 1px solid rgba(51, 51, 51, 0.12);
    }

    #message-area.success {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 1.02rem;
      font-weight: 700;
      background: rgba(31, 56, 100, 0.1);
      color: var(--sumi);
      border: 1px solid rgba(31, 56, 100, 0.4);
    }

    #message-area.fail {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 0.97rem;
      font-weight: 700;
      background: rgba(184, 184, 184, 0.22);
      color: rgba(51, 51, 51, 0.68);
      border: 1px solid rgba(184, 184, 184, 0.45);
    }

    /* ===== SECTION: ジャンルヒント ===== */
    #genre-hint {
      display: none;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--aka);
      padding: 7px 18px;
      border-radius: 4px;
      border: 1px dashed rgba(31, 56, 100, 0.45);
      background: rgba(31, 56, 100, 0.08);
      width: 100%;
      max-width: 420px;
    }

    #genre-hint.visible {
      display: block;
      animation: genreHintFadeIn 0.9s ease-out forwards;
    }

    @keyframes genreHintFadeIn {
      0%   { opacity: 0; transform: translateY(-4px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ===== SECTION: フッター・リプレイ ===== */
    footer {
      padding-bottom: 44px;
    }

    #replay-btn {
      display: none;
      padding: 15px 44px;
      background: transparent;
      color: var(--sumi);
      border: 1.5px solid rgba(51, 51, 51, 0.32);
      border-radius: 5px;
      font-size: 0.95rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.16em;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #replay-btn:hover {
      border-color: rgba(51, 51, 51, 0.55);
      background: rgba(51, 51, 51, 0.05);
    }

    #replay-btn:active {
      transform: scale(0.97);
    }

    /* ===== SECTION: 完全正解エフェクト ===== */

    /* 全問正解時、最後の行のタイルが左から順にフラッシュして跳ねる */
    .cell.correct.perfect-tile-flash {
      animation: tilePerfectFlash 0.32s ease-out forwards;
    }

    @keyframes tilePerfectFlash {
      0%   { transform: scale(1); }
      42%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* ===== SECTION: 結果発表オーバーレイ ===== */
    #result-overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #result-overlay.visible {
      display: flex;
    }

    /* カード外側(オーバーレイの余白部分)をタップすると消える。カード自体はクリックを拾う */
    .result-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      background: rgba(250, 247, 240, 0.96);
      border: 1.5px solid rgba(31, 56, 100, 0.45);
      border-radius: 8px;
      padding: 26px 26px 22px;
      max-width: 340px;
      text-align: center;
      box-shadow: 0 8px 28px rgba(51, 51, 51, 0.18);
      animation: resultCardIn 0.4s ease-out forwards;
    }

    .result-text {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--sumi);
      line-height: 1.6;
      letter-spacing: 0.04em;
    }

    .result-replay-btn {
      padding: 13px 34px;
      background: var(--midori);
      color: var(--washi);
      border: none;
      border-radius: 5px;
      font-size: 0.92rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .result-replay-btn:hover {
      opacity: 0.85;
    }

    .result-replay-btn:active {
      transform: scale(0.94);
    }

    @keyframes resultCardIn {
      0%   { opacity: 0; transform: scale(0.9) translateY(6px); }
      100% { opacity: 1; transform: scale(1)   translateY(0); }
    }

    /* ===== SECTION: スタート画面 ===== */
    #start-screen {
      position: fixed;
      inset: 0;
      background: var(--washi);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .start-screen-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      width: 100%;
      max-width: 360px;
    }

    .start-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
    }

    .start-label {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-indent: 0.2em;
      color: var(--sumiNezumi);
    }

    #length-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .length-btn {
      flex: 1;
      min-width: 68px;
      max-width: 96px;
      padding: 14px 8px;
      background: transparent;
      color: rgba(51, 51, 51, 0.55);
      border: 1.5px solid rgba(51, 51, 51, 0.22);
      border-radius: 5px;
      font-size: 0.88rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s, color 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .length-btn:hover:not(.selected) {
      border-color: rgba(51, 51, 51, 0.4);
      color: var(--sumi);
      background: rgba(51, 51, 51, 0.04);
    }

    .length-btn.selected {
      background: rgba(31, 56, 100, 0.15);
      border-color: var(--aka);
      color: var(--sumi);
    }

    #game-start-btn {
      width: 100%;
      max-width: 220px;
      padding: 16px 32px;
      background: var(--aka);
      color: var(--washi);
      border: none;
      border-radius: 5px;
      font-size: 1.05rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-indent: 0.22em;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    #game-start-btn:hover {
      opacity: 0.82;
    }

    #game-start-btn:active {
      transform: scale(0.94);
    }

    #catalog-btn {
      width: 100%;
      max-width: 220px;
      padding: 13px 24px;
      background: rgba(31, 56, 100, 0.06);
      color: var(--aka);
      border: 1.5px solid rgba(31, 56, 100, 0.4);
      border-radius: 5px;
      font-size: 0.92rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s, opacity 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    #catalog-btn:hover {
      border-color: var(--aka);
      background: rgba(31, 56, 100, 0.12);
    }

    #catalog-btn:active {
      transform: scale(0.94);
    }

    #test-start-btn {
      width: 100%;
      max-width: 220px;
      padding: 11px 24px;
      background: transparent;
      color: #8C6414; /* 黄色を背景上での視認性のため濃くしたトーン */
      border: 1.5px solid rgba(232, 185, 63, 0.5);
      border-radius: 5px;
      font-size: 0.85rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s, opacity 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    #test-start-btn:hover {
      border-color: var(--kiiro);
      background: rgba(232, 185, 63, 0.1);
    }

    #test-start-btn:active {
      transform: scale(0.94);
    }

    /* ===== SECTION: テストモードバナー ===== */
    #test-mode-banner {
      display: none;
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 7px 16px;
      border-radius: 4px;
      background: rgba(232, 185, 63, 0.15);
      border: 1px solid rgba(232, 185, 63, 0.5);
      color: #8C6414; /* 黄色を背景上での視認性のため濃くしたトーン */
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
    }

    #test-mode-banner.visible {
      display: block;
    }

    /* ===== SECTION: 一覧画面 ===== */
    #catalog-screen {
      position: fixed;
      inset: 0;
      background: var(--washi);
      z-index: 210;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px);
    }

    #catalog-screen.visible {
      display: flex;
    }

    .catalog-inner {
      width: 100%;
      max-width: 480px;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 16px;
    }

    .catalog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .catalog-title {
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: 0.14em;
      color: var(--aka);
    }

    #catalog-back-btn {
      padding: 9px 18px;
      background: transparent;
      color: var(--sumi);
      border: 1.5px solid rgba(51, 51, 51, 0.32);
      border-radius: 5px;
      font-size: 0.82rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    #catalog-back-btn:hover {
      border-color: rgba(51, 51, 51, 0.55);
      background: rgba(51, 51, 51, 0.05);
    }

    #catalog-groups {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;

      "こうもり": { "length": 4, "genre": "どうぶつ" },
      "すなあそび": { "length": 5, "genre": "そとあそび" },

      "たいようけい": { "length": 6, "genre": "そら・てんたい" },
      "おつきみ": { "length": 4, "genre": "きせつ・ぎょうじ" },
      "くびかざり": { "length": 5, "genre": "ふく" },
      "ぞうきん": { "length": 4, "genre": "そうじ・せんたく" },
      "おとうさん": { "length": 5, "genre": "かぞく・ひと" },
      "せんぷうき": { "length": 5, "genre": "でんかせいひん" },
      "おもちゃ": { "length": 4, "genre": "おもちゃ" },
      "おばさん": { "length": 4, "genre": "かぞく・ひと" },
      "せつぶん": { "length": 4, "genre": "きせつ・ぎょうじ" },
      "じてんしゃ": { "length": 5, "genre": "のりもの" },
      "たんけんたい": { "length": 6, "genre": "ぼうけん・ファンタジー" },
      "こうえん": { "length": 4, "genre": "まち・たてもの" },
      "ふうせんわり": { "length": 6, "genre": "がっこうぎょうじ" },
      "すぽんじ": { "length": 4, "genre": "そうじ・せんたく" },
      "しんごうき": { "length": 5, "genre": "まち・たてもの" },
      "ぼうしとり": { "length": 5, "genre": "がっこうぎょうじ" },
      "きゅうり": { "length": 4, "genre": "やさい・くだもの" },
      "かみひこうき": { "length": 6, "genre": "おもちゃ" },
      "しんかんせん": { "length": 6, "genre": "のりもの" },
      "あかちゃん": { "length": 5, "genre": "かぞく・ひと" },
      "ふかしいも": { "length": 5, "genre": "りょうり" },
      "でんしゃ": { "length": 4, "genre": "のりもの" },
      "おかいもの": { "length": 5, "genre": "いえ・くらし" },
      "あまのがわ": { "length": 5, "genre": "そら・てんたい" },
      "たんぽぽ": { "length": 4, "genre": "しょくぶつ" },
      "わきばら": { "length": 4, "genre": "からだ" },
      "たまいれ": { "length": 4, "genre": "がっこうぎょうじ" },
      "おじいさん": { "length": 5, "genre": "かぞく・ひと" },
      "あさがお": { "length": 4, "genre": "しょくぶつ" },
      "たからじま": { "length": 5, "genre": "ぼうけん・ファンタジー" },
      "ひまわり": { "length": 4, "genre": "しょくぶつ" },
      "おこのみやき": { "length": 6, "genre": "りょうり" },
      "ほうれんそう": { "length": 6, "genre": "やさい・くだもの" },
      "かたつむり": { "length": 5, "genre": "どうぶつ" }
    };

    // ===== SECTION: ゲーム状態 =====
    let targetWord    = "";
    let wordLength    = 0;
    let maxAttempts   = 0;
    let currentAttempt = 0;
    let gameOver        = false;
    let lastWord        = "";
    let currentGenre    = "";
    let genreHintShown  = false;
    let selectedLength  = 0; // 0 = おまかせ、4/5/6 = 指定文字数
    let isTestMode      = false;
    let keyboardScrollPending = false; // ゲーム開始直後の初回フォーカスのみスクロールさせるためのフラグ
    let judgingLocked   = false; // 回答送信〜正誤判定終了まで、キーボード追従による画面位置調整を止めるためのフラグ

    // ===== SECTION: DOM参照 =====
    const scrollArea    = document.getElementById("scroll-area");
    const gridContainer = document.getElementById("grid-container");
    const guessInput    = document.getElementById("guess-input");
    const submitBtn     = document.getElementById("submit-btn");
    const messageArea   = document.getElementById("message-area");
    const replayBtn     = document.getElementById("replay-btn");
    const genreHintEl   = document.getElementById("genre-hint");
    const resultOverlay  = document.getElementById("result-overlay");
    const startScreen    = document.getElementById("start-screen");
    const gameStartBtn   = document.getElementById("game-start-btn");
    const catalogBtn     = document.getElementById("catalog-btn");
    const testStartBtn   = document.getElementById("test-start-btn");
    const testModeBanner = document.getElementById("test-mode-banner");
    const lengthBtns     = document.querySelectorAll(".length-btn");
    const catalogScreen  = document.getElementById("catalog-screen");
    const catalogGroups  = document.getElementById("catalog-groups");
    const catalogBackBtn = document.getElementById("catalog-back-btn");

    // ===== SECTION: ユーティリティ =====
    function isHiragana(str) {
      return /^[ぁ-ゖー]+$/.test(str);
    }

    function isInWordList(word) {
      return word in WORDS_WITH_GENRE;
    }

    function pickWord() {
      let pool;
      if (selectedLength && [4, 5, 6].includes(selectedLength)) {
        pool = Object.keys(WORDS_WITH_GENRE).filter(
          w => WORDS_WITH_GENRE[w].length === selectedLength && w !== lastWord
        );
      } else {
        pool = Object.keys(WORDS_WITH_GENRE).filter(w => w !== lastWord);
      }
      return pool[Math.floor(Math.random() * pool.length)];
    }

    // ===== SECTION: グリッド構築・更新 =====
    let gridCells = [];

    function buildGrid() {
      // セルサイズをレスポンシブに決定
      const gap       = 7;
      const padding   = 32;
      const maxCell   = 58;
      const available = Math.min(window.innerWidth - padding, 448 - padding);
      const totalGap  = gap * (wordLength - 1);
      const cellSize  = Math.min(maxCell, Math.floor((available - totalGap) / wordLength));

      gridContainer.style.setProperty("--cell-size", cellSize + "px");
      gridContainer.style.setProperty("--gap", gap + "px");

      gridContainer.innerHTML = "";
      gridCells = [];

      for (let r = 0; r < maxAttempts; r++) {
        const row = document.createElement("div");
        row.classList.add("grid-row");
        const cells = [];
        for (let c = 0; c < wordLength; c++) {
          const cell = document.createElement("div");
          cell.classList.add("cell");
          row.appendChild(cell);
          cells.push(cell);
        }
        gridContainer.appendChild(row);
        gridCells.push(cells);
      }
      setActiveRow(0);
    }

    function setActiveRow(rowIndex) {
      gridCells.forEach((cells, r) => {
        cells.forEach(cell => {
          cell.classList.toggle("active-row", r === rowIndex);
        });
      });
    }

    // 指定した行をキーボードに隠れない見やすい位置までスクロールする
    function scrollRowIntoView(rowIndex) {
      if (gridCells[rowIndex]) {
        gridCells[rowIndex][0].scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }

    // ===== SECTION: 判定ロジック =====
    function evaluate(guess, target) {
      const result      = new Array(wordLength).fill("absent");
      const targetUsed  = new Array(wordLength).fill(false);
      const guessUsed   = new Array(wordLength).fill(false);

      for (let i = 0; i < wordLength; i++) {
        if (guess[i] === target[i]) {
          result[i]     = "correct";
          targetUsed[i] = true;
          guessUsed[i]  = true;
        }
      }

      for (let i = 0; i < wordLength; i++) {
        if (guessUsed[i]) continue;
        for (let j = 0; j < wordLength; j++) {
          if (targetUsed[j]) continue;
          if (guess[i] === target[j]) {
            result[i]     = "present";
            targetUsed[j] = true;
            break;
          }
        }
      }

      return result;
    }

    // ===== SECTION: セル色付け =====
    function colorRow(rowIndex, guess, result) {
      const cells = gridCells[rowIndex];
      for (let i = 0; i < wordLength; i++) {
        const cell = cells[i];
        cell.innerHTML = `<span>${guess[i]}</span>`;
        cell.classList.remove("active-row", "has-char");

        // 1文字ずつ時間差で印を押す
        const delay = i * 130;
        setTimeout(() => {
          cell.classList.add(result[i]);
        }, delay);
      }
    }

    // ===== SECTION: ライブプレビュー =====
    function updatePreview() {
      if (gameOver) return;
      const val   = guessInput.value;
      const cells = gridCells[currentAttempt];
      if (!cells) return;

      for (let i = 0; i < wordLength; i++) {
        const char = val[i] || "";
        if (char) {
          cells[i].innerHTML = `<span>${char}</span>`;
          cells[i].classList.add("has-char");
        } else {
          cells[i].innerHTML = "";
          cells[i].classList.remove("has-char");
        }
      }
    }

    // ===== SECTION: メッセージ表示 =====
    function showMessage(text, type) {
      messageArea.textContent = text;
      messageArea.className   = type || "";
    }

    // 結果発表（正答時のメッセージ）を画面中央に表示する。外側タップで消えた後もメッセージ欄に再表示できるよう保持する
    let lastResultText = "";

    function showResultOverlay(text) {
      lastResultText = text;
      resultOverlay.innerHTML = `
        <div class="result-card">
          <p class="result-text">${text}</p>
          <button id="result-replay-btn" class="result-replay-btn">もう一度遊ぶ</button>
        </div>
      `;
      resultOverlay.classList.add("visible");
      document.getElementById("result-replay-btn").addEventListener("click", () => {
        hideResultOverlay();
        showStartScreen();
      });
    }

    function hideResultOverlay() {
      resultOverlay.classList.remove("visible");
      resultOverlay.innerHTML = "";
    }

    // ===== SECTION: ジャンルヒント表示 =====
    function showGenreHint() {
      genreHintEl.textContent = `ジャンル：${currentGenre}`;
      genreHintEl.classList.remove("visible");
      // リフロー強制で再アニメーション保証
      void genreHintEl.offsetWidth;
      genreHintEl.classList.add("visible");
    }

    // ===== SECTION: 完全正解エフェクト =====

    // 全問正解時、最後の行のタイルを左から順にフラッシュさせてから onComplete を呼ぶ
    function triggerPerfectEffect(word, onComplete) {
      const lastRowIdx = currentAttempt - 1;
      const rowCells   = gridCells[lastRowIdx];

      const sweepMs = 460;
      rowCells.forEach((cell, i) => {
        const d = wordLength <= 1 ? 0 : (i / (wordLength - 1)) * sweepMs;
        setTimeout(() => cell.classList.add('perfect-tile-flash'), d);
      });

      setTimeout(onComplete, sweepMs + 400);
    }

    // ===== SECTION: 推測処理 =====
    // ボタン押下でinputからフォーカスが外れた直後に同期でfocus()し直すと、
    // 変換未確定のまま答えた場合にIMEの状態が乱れ次の入力が崩れる端末があるため、
    // 次ティックまで遅延させて再フォーカスする
    function refocusGuessInput() {
      setTimeout(() => guessInput.focus(), 0);
    }

    function submitGuess() {
      if (gameOver) return;

      const guess = guessInput.value.trim();
      guessInput.value = "";
      updatePreview();

      if (guess.length !== wordLength) {
        showMessage(`${wordLength}文字で入力してください。（現在 ${guess.length} 文字）`, "error");
        refocusGuessInput();
        return;
      }

      if (!isHiragana(guess)) {
        showMessage("ひらがなのみで入力してください。", "error");
        refocusGuessInput();
        return;
      }

      // テストモード: 1回目の回答は必ず全正解として判定
      const result = (isTestMode && currentAttempt === 0)
        ? new Array(wordLength).fill("correct")
        : evaluate(guess, targetWord);

      // 判定結果が見える位置まで一度だけスクロールし、以後は判定終了までこの位置で固定する
      judgingLocked = true;
      scrollRowIntoView(currentAttempt);
      colorRow(currentAttempt, guess, result);
      currentAttempt++;

      const revealEnd = (wordLength - 1) * 130 + 300;

      // 入力クリアに伴うIME候補バーの消失などでキーボード追従の再計算が走ると、
      // 判定中にもかかわらず画面が微妙にずれて見えるため、判定終了まで抑止する
      setTimeout(() => {
        judgingLocked = false;
        adjustForKeyboard();
      }, revealEnd);

      if (result.every(r => r === "correct")) {
        gameOver = true;
        const tries = currentAttempt;
        addSolvedWord(targetWord);
        setTimeout(() => {
          triggerPerfectEffect(targetWord, () => {
            showMessage("", "");
            showResultOverlay(`「${targetWord}」を${tries}回で当てた！`);
            endGame();
          });
        }, revealEnd);
        return;
      }

      if (currentAttempt >= maxAttempts) {
        gameOver = true;
        setTimeout(() => {
          showMessage(`残念、正解は「${targetWord}」だったよ。`, "fail");
          endGame();
        }, revealEnd);
        return;
      }

      setActiveRow(currentAttempt);
      const remaining = maxAttempts - currentAttempt;
      showMessage(`残り ${remaining} 回`, "info");

      // 試行回数が最大の半分に達した時点でジャンルヒントを1回だけ表示
      if (!genreHintShown && currentAttempt === Math.ceil(maxAttempts / 2)) {
        genreHintShown = true;
        setTimeout(() => showGenreHint(), revealEnd);
      }

      refocusGuessInput();
    }

    // ===== SECTION: ゲーム終了 =====
    function endGame() {
      submitBtn.disabled      = true;
      guessInput.disabled     = true;
      replayBtn.style.display = "inline-block";
      lastWord = targetWord;
    }

    // ===== SECTION: ゲーム開始 =====
    function startGame(testMode = false) {
      isTestMode      = testMode;
      targetWord      = pickWord();
      wordLength      = WORDS_WITH_GENRE[targetWord].length;
      currentGenre    = WORDS_WITH_GENRE[targetWord].genre;
      maxAttempts     = wordLength + 7;
      currentAttempt  = 0;
      gameOver        = false;
      judgingLocked   = false;

      genreHintShown  = false;
      genreHintEl.textContent = "";
      genreHintEl.classList.remove("visible");
      hideResultOverlay();

      guessInput.disabled     = false;
      guessInput.value        = "";
      submitBtn.disabled      = false;
      replayBtn.style.display = "none";

      if (isTestMode) {
        testModeBanner.classList.add("visible");
      } else {
        testModeBanner.classList.remove("visible");
      }

      buildGrid();
      showMessage(`${wordLength}文字の言葉をあてよう。（最大 ${maxAttempts} 回）`, "info");
      keyboardScrollPending = true;
      guessInput.focus();
    }

    // ===== SECTION: スタート画面制御 =====
    function showStartScreen() {
      startScreen.style.display = "flex";
    }

    function hideStartScreen() {
      startScreen.style.display = "none";
    }

    lengthBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        lengthBtns.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedLength = parseInt(btn.dataset.length);
      });
    });

    gameStartBtn.addEventListener("click", () => {
      hideStartScreen();
      startGame(false);
    });

    testStartBtn.addEventListener("click", () => {
      hideStartScreen();
      startGame(true);
    });

    // ===== SECTION: 一覧画面（図鑑） =====
    const SOLVED_WORDS_STORAGE_KEY = "kotodama-solved-words";

    function loadSolvedWords() {
      try {
        const raw = localStorage.getItem(SOLVED_WORDS_STORAGE_KEY);
        return new Set(raw ? JSON.parse(raw) : []);
      } catch (e) {
        return new Set();
      }
    }

    const solvedWords = loadSolvedWords();

    function addSolvedWord(word) {
      if (solvedWords.has(word)) return;
      solvedWords.add(word);
      localStorage.setItem(SOLVED_WORDS_STORAGE_KEY, JSON.stringify([...solvedWords]));
    }

    // 文字数ごとにグループ化し、あいうえお順で並べて描画する。未正答語はジャンルのみ薄く表示する
    function buildCatalog() {
      catalogGroups.innerHTML = "";

      [4, 5, 6].forEach(length => {
        const words = Object.keys(WORDS_WITH_GENRE)
          .filter(w => WORDS_WITH_GENRE[w].length === length)
          .sort((a, b) => a.localeCompare(b, 'ja'));
        if (words.length === 0) return;

        const group = document.createElement('div');
        group.className = 'catalog-group';

        const title = document.createElement('p');
        title.className = 'catalog-group-title';
        title.textContent = `${length}文字`;
        group.appendChild(title);

        const list = document.createElement('div');
        list.className = 'catalog-word-list';

        words.forEach(word => {
          const isSolved = solvedWords.has(word);
          const item = document.createElement('div');
          item.className = `catalog-word ${isSolved ? 'solved' : 'unsolved'}`;
          if (isSolved) {
            item.textContent = word;
          } else {
            const ghost = document.createElement('span');
            ghost.className = 'catalog-genre-ghost';
            ghost.textContent = WORDS_WITH_GENRE[word].genre;
            item.appendChild(ghost);
          }
          list.appendChild(item);
        });

        group.appendChild(list);
        catalogGroups.appendChild(group);
      });
    }

    function showCatalogScreen() {
      buildCatalog();
      catalogScreen.classList.add("visible");
    }

    function hideCatalogScreen() {
      catalogScreen.classList.remove("visible");
    }

    catalogBtn.addEventListener("click", () => {
      hideStartScreen();
      showCatalogScreen();
    });

    catalogBackBtn.addEventListener("click", () => {
      hideCatalogScreen();
      showStartScreen();
    });

    // ===== SECTION: イベントリスナー登録 =====
    // ボタンタップ時にinputからフォーカスが外れるとキーボードの開閉が発生し、
    // その一瞬の高さ変化で画面が勝手にガタつくため、mousedownの既定動作を止めて
    // フォーカスを維持したままにする
    submitBtn.addEventListener("mousedown", e => e.preventDefault());
    submitBtn.addEventListener("click", submitGuess);

    guessInput.addEventListener("input", updatePreview);

    guessInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        submitGuess();
      }
    });

    replayBtn.addEventListener("click", showStartScreen);

    // 結果発表オーバーレイの外側（カード以外）をタップすると閉じ、メッセージ欄に同じ文言を表示する
    resultOverlay.addEventListener("click", e => {
      if (e.target === resultOverlay) {
        hideResultOverlay();
        showMessage(lastResultText, "success");
      }
    });

    // ===== SECTION: 初回起動・iOS対応 =====
    showStartScreen();

    // --- サブ: キーボード表示時のビジュアルビューポート追従（iOS対応） ---
    const appShell = document.getElementById("app-shell");

    function adjustForKeyboard() {
      if (!window.visualViewport || judgingLocked) return;
      const vv = window.visualViewport;
      appShell.style.height = vv.height + "px";
      appShell.style.top = (vv.offsetTop || 0) + "px";
    }

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", adjustForKeyboard);
      window.visualViewport.addEventListener("scroll", adjustForKeyboard);
    }
    adjustForKeyboard();

    // キーボード表示後にアクティブ行をスクロールで見えるようにする
    // ※ ゲーム開始直後の初回フォーカスのみ発火させる。回答のたびの見やすい位置への
    //   スクロールは submitGuess() 側で判定開始時に一度だけ行う
    guessInput.addEventListener("focus", () => {
      if (!keyboardScrollPending) return;
      keyboardScrollPending = false;
      setTimeout(() => scrollRowIntoView(currentAttempt), 350);
    });
  </script>
