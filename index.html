<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ことだまリドル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ========== リセット & カスタムプロパティ ========== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --sumi:      #14151a;  /* 墨色(背景) */
      --washi:     #f3ead9;  /* 生成り/和紙色 */
      --shu:       #c8372e;  /* 朱色(正解) */
      --kogane:    #c9a227;  /* 黄金(位置違い) */
      --sumiNezumi:#6b6f76;  /* 墨鼠(不正解) */
    }

    /* ========== ベース ========== */
    html, body {
      height: 100%;
    }

    body {
      font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: var(--sumi);
      color: var(--washi);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========== ヘッダー ========== */
    header {
      width: 100%;
      text-align: center;
      padding: 28px 16px 22px;
      position: relative;
    }

    .title-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* 朱色の細線(上部装飾) */
    .title-rule {
      width: 48px;
      height: 1px;
      background: var(--shu);
      opacity: 0.7;
    }

    .title-kana {
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-weight: 800;
      font-size: clamp(1.9rem, 7.5vw, 2.5rem);
      letter-spacing: 0.22em;
      color: var(--washi);
      line-height: 1;
      text-indent: 0.22em; /* letter-spacing による右のズレ補正 */
    }

    .title-sub {
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      color: var(--sumiNezumi);
      text-indent: 0.28em;
    }

    /* ========== メインコンテンツ ========== */
    main {
      width: 100%;
      max-width: 480px;
      padding: 0 16px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      flex: 1;
    }

    /* ========== 凡例 ========== */
    #legend {
      display: flex;
      gap: 14px;
      font-size: 0.72rem;
      color: var(--sumiNezumi);
      flex-wrap: wrap;
      justify-content: center;
      letter-spacing: 0.04em;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legend-swatch.correct  { background: var(--shu); }
    .legend-swatch.present  { background: var(--kogane); }
    .legend-swatch.absent   { background: var(--sumiNezumi); }

    /* ========== グリッド ========== */
    #grid-container {
      display: flex;
      flex-direction: column;
      gap: var(--gap, 7px);
    }

    .grid-row {
      display: flex;
      gap: var(--gap, 7px);
    }

    /* セル基本 */
    .cell {
      width: var(--cell-size, 56px);
      height: var(--cell-size, 56px);
      border: 1.5px solid rgba(243, 234, 217, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-size: calc(var(--cell-size, 56px) * 0.42);
      font-weight: 700;
      border-radius: 4px;
      background: transparent;
      color: var(--washi);
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* タイピング中(文字がある)セル */
    .cell.has-char {
      border-color: rgba(243, 234, 217, 0.32);
      background: rgba(243, 234, 217, 0.05);
    }

    /* アクティブ行 */
    .cell.active-row {
      border-color: rgba(243, 234, 217, 0.28);
    }

    /* 文字を擬似要素の手前に */
    .cell > span {
      position: relative;
      z-index: 1;
    }

    /* ===== 朱色・正解: 判を押す演出 ===== */
    .cell.correct {
      border-color: var(--shu);
      color: var(--washi);
      transition: none;
      animation: hankoPress 0.52s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    /* 朱印の広がり(墨汁がにじむように中心から外へ) */
    .cell.correct::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--shu);
      border-radius: 2px;
      transform: scale(0);
      transform-origin: center;
      animation: inkBleed 0.46s ease-out forwards;
      z-index: 0;
    }

    /* ===== 黄金・位置違い ===== */
    .cell.present {
      background: var(--kogane);
      border-color: var(--kogane);
      color: var(--sumi);
    }

    /* ===== 墨鼠・不正解 ===== */
    .cell.absent {
      background: rgba(107, 111, 118, 0.22);
      border-color: rgba(107, 111, 118, 0.38);
      color: rgba(243, 234, 217, 0.38);
    }

    /* ===== 判を押すアニメーション ===== */
    /* 圧縮 → 跳ね返り → 余韻 */
    @keyframes hankoPress {
      0%   { transform: scale(1); }
      16%  { transform: scale(0.86); }
      38%  { transform: scale(1.08); }
      58%  { transform: scale(0.96); }
      78%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    /* 朱印の広がり: 中心から外へにじみ出る */
    @keyframes inkBleed {
      0%   { transform: scale(0);    opacity: 1; }
      55%  { transform: scale(1.1);  opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }

    /* ===== 言霊が宿る - 全タイル共通 基本エフェクト ===== */
    /* 霊光が中心から湧き上がり、タイルに宿って静まる */
    .cell.kotodama-reveal::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(243, 234, 217, 0.2);
      pointer-events: none;
      z-index: 0;
      animation: kotodamaSpirit 0.9s ease-out forwards;
    }

    @keyframes kotodamaSpirit {
      0%   { opacity: 0;    transform: scale(0.45); }
      25%  { opacity: 0.65; transform: scale(1.0); }
      100% { opacity: 0;    transform: scale(1.0); }
    }

    /* ========== 入力エリア ========== */
    #input-area {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }

    #guess-input {
      flex: 1;
      padding: 14px 14px;
      font-size: 1.22rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 500;
      background: rgba(243, 234, 217, 0.05);
      border: 1.5px solid rgba(243, 234, 217, 0.18);
      border-radius: 5px;
      color: var(--washi);
      outline: none;
      text-align: center;
      letter-spacing: 0.18em;
      transition: border-color 0.2s, background 0.2s;
      caret-color: var(--shu);
      min-width: 0;
    }

    #guess-input::placeholder {
      color: rgba(243, 234, 217, 0.22);
      letter-spacing: 0.04em;
      font-size: 0.9rem;
    }

    #guess-input:focus {
      border-color: rgba(243, 234, 217, 0.42);
      background: rgba(243, 234, 217, 0.07);
    }

    #guess-input:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #submit-btn {
      padding: 14px 20px;
      background: var(--shu);
      color: var(--washi);
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.12em;
      cursor: pointer;
      white-space: nowrap;
      min-width: 80px;
      transition: opacity 0.18s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    #submit-btn:hover:not(:disabled) {
      opacity: 0.82;
    }

    #submit-btn:active:not(:disabled) {
      transform: scale(0.94);
    }

    #submit-btn:disabled {
      background: rgba(107, 111, 118, 0.5);
      cursor: not-allowed;
    }

    /* ========== メッセージエリア ========== */
    #message-area {
      min-height: 48px;
      text-align: center;
      padding: 10px 18px;
      border-radius: 5px;
      width: 100%;
      max-width: 420px;
      line-height: 1.6;
      letter-spacing: 0.06em;
      font-size: 0.9rem;
    }

    #message-area.error {
      background: rgba(200, 55, 46, 0.12);
      color: #e8807a;
      border: 1px solid rgba(200, 55, 46, 0.28);
    }

    #message-area.info {
      background: rgba(243, 234, 217, 0.05);
      color: rgba(243, 234, 217, 0.55);
      border: 1px solid rgba(243, 234, 217, 0.1);
    }

    #message-area.success {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 1.02rem;
      font-weight: 700;
      background: rgba(200, 55, 46, 0.1);
      color: var(--washi);
      border: 1px solid rgba(200, 55, 46, 0.35);
    }

    #message-area.fail {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 0.97rem;
      font-weight: 700;
      background: rgba(107, 111, 118, 0.12);
      color: rgba(243, 234, 217, 0.65);
      border: 1px solid rgba(107, 111, 118, 0.28);
    }

    /* ========== フッター / リプレイ ========== */
    footer {
      padding-bottom: 44px;
    }

    #replay-btn {
      display: none;
      padding: 15px 44px;
      background: transparent;
      color: var(--washi);
      border: 1.5px solid rgba(243, 234, 217, 0.3);
      border-radius: 5px;
      font-size: 0.95rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.16em;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #replay-btn:hover {
      border-color: rgba(243, 234, 217, 0.6);
      background: rgba(243, 234, 217, 0.05);
    }

    #replay-btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <header>
    <div class="title-wrap">
      <div class="title-rule"></div>
      <h1 class="title-kana">ことだまリドル</h1>
      <p class="title-sub">言葉に宿る霊力を解き明かせ</p>
      <div class="title-rule"></div>
    </div>
  </header>

  <main>
    <div id="legend">
      <div class="legend-item">
        <div class="legend-swatch correct"></div>
        <span>位置も文字も正解</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch present"></div>
        <span>文字はあるが位置が違う</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch absent"></div>
        <span>含まれない文字</span>
      </div>
    </div>

    <div id="grid-container"></div>

    <div id="input-area">
      <input
        type="text"
        id="guess-input"
        placeholder="ひらがなで入力"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <button id="submit-btn">唱える</button>
    </div>

    <div id="message-area"></div>
  </main>

  <footer>
    <button id="replay-btn">再び唱える</button>
  </footer>

  <script>
    // ===== 単語データ =====
    const WORD_LIST = {
      4: [
        "あおぞら","あきかぜ","あきばれ","あさがお","あさつゆ",
        "あしくび","あまがさ","あまぐも","あまだれ","あやとり",
        "ありくい","いのしし","いろおに","うなどん","うれしさ",
        "えきいん","えきまえ","えぷろん","えんそく","えんぴつ",
        "おおあめ","おおかみ","おじさん","おつきみ","おどろき",
        "おにぎり","おばさん","おひさま","おもいで","おもちゃ",
        "おりがみ","おんがく","かいがん","かさたて","かつどん",
        "かなしみ","かぼちゃ","かみなり","かみのけ","からあげ",
        "かんきり","がっこう","がんばり","きゃべつ","きゅうり",
        "ぎょうざ","くしやき","くちびる","くつした","くつばこ",
        "くりっぷ","くれよん","くわがた","けいたい","けしごむ",
        "けんどう","げんかん","こうえん","こうちゃ","こうばん",
        "こうもり","ことのは","こんぱす","こんびに","さんだる",
        "ざぶとん","しあわせ","しまうま","しゃてき","しゃもじ",
        "しょうが","しょうゆ","すいえい","すきやき","すぽんじ",
        "すりっぱ","せつぶん","せんざい","せんせい","せんぬき",
        "せんべい","そうじき","ぞうきん","たいそう","たいふう",
        "たいやき","たいよう","たけうま","たこやき","たなばた",
        "たにがわ","たまいれ","たまねぎ","たんけん","たんぽぽ",
        "だいこん","だいふく","だちょう","ちかてつ","ちかどう",
        "ちゃはん","ちゃわん","ちりとり","つなひき","つまさき",
        "てのひら","てぶくろ","てんどん","てんぷら","でんしゃ",
        "でんわき","ともだち","とらっく","どらやき","ながぐつ",
        "なわとび","にじいろ","にわとり","にんじん","にんにく",
        "のりまき","はくさい","はっけん","はつしも","はつゆき",
        "はるかぜ","はるさめ","はんてん","ぱじゃま","ひこうき",
        "ひだまり","ひまわり","ふうせん","ふうりん","ふくろう",
        "ふでばこ","ぺんぎん","ほしぞら","ぼうけん","ぼたもち",
        "まえかけ","まないた","まらそん","まんげつ","みかづき",
        "みつばち","ものさし","やきいも","やきそば","やきとり",
        "やきにく","やきゅう","やさしさ","やまみち","ゆうやけ",
        "ゆきぐも","ゆびさき","ようかん","よろこび","らいおん",
        "れんこん","わきばら","わたあめ"
      ],
      5: [
        "あかちゃん","あさごはん","あまのがわ","いなりずし","えいがかん",
        "おおみそか","おかあさん","おかいもの","おじいさん","おちゃづけ",
        "おとうさん","おともだち","おにいさん","おにごっこ","おねえさん",
        "おばあさん","おもいやり","おやこどん","かきごおり","かくれんぼ",
        "かしわもち","かたつむり","かぶとむし","かみかざり","かりんとう",
        "くびかざり","くりすます","こままわし","さかなつり","さくらもち",
        "さくらんぼ","さつまいも","しもばしら","しゅうまい","しょうがつ",
        "しんごうき","じてんしゃ","じどうしゃ","じゃがいも","じゃんけん",
        "じゅうどう","すいかわり","すなあそび","すぱげてぃ","すべりだい",
        "せんたくき","せんぷうき","たからじま","たからばこ","たからもの",
        "たまごやき","だいかぞく","ちからもち","ちらしずし","でんきゅう",
        "としょかん","どろあそび","なつやすみ","にくやさん","はりねずみ",
        "はるやすみ","ばんごはん","ぱんやさん","ひなまつり","ひみつきち",
        "びょういん","ふかしいも","ふゆやすみ","ほうじちゃ","ほうちょう",
        "ほんやさん","ぼうしとり","ぼんおどり","まんじゅう","みずあそび",
        "みずたまり","むしめがね","もみじがり","やおやさん","やっきょく",
        "やまのぼり","ゆうえんち","ゆきあそび","ゆきだるま","ゆきまつり",
        "らんどせる","りょくちゃ","りんごあめ","れいぞうこ"
      ],
      6: [
        "うぐいすもち","うちゅうじん","うんどうかい","おこのみやき","おしょうがつ",
        "おにんぎょう","おばけやしき","かいさつぐち","かいすいよく","かみなりぐも",
        "かみひこうき","きゅうしょく","きょうかしょ","くすりやさん","さかなやさん",
        "さんどいっち","さんりんしゃ","しゃぶしゃぶ","しゃぼんだま","しんかんせん",
        "すいぞくかん","すいへいせん","たいようけい","たんけんたい","たんじょうび",
        "ちょうちょう","ちょこばなな","ちんげんさい","てんとうむし","とうもろこし",
        "どうぶつえん","ねこじゃらし","はくぶつかん","びじゅつかん","ふうせんわり",
        "ほうせきばこ","ほうれんそう","ぼうけんしゃ","まつぼっくり","まほうつかい",
        "もんじゃやき"
      ]
    };

    // ===== ゲーム状態 =====
    let targetWord    = "";
    let wordLength    = 0;
    let maxAttempts   = 0;
    let currentAttempt = 0;
    let gameOver      = false;
    let lastWord      = "";

    // ===== DOM =====
    const gridContainer = document.getElementById("grid-container");
    const guessInput    = document.getElementById("guess-input");
    const submitBtn     = document.getElementById("submit-btn");
    const messageArea   = document.getElementById("message-area");
    const replayBtn     = document.getElementById("replay-btn");

    // ===== ユーティリティ =====
    function isHiragana(str) {
      return /^[ぁ-ゖー]+$/.test(str);
    }

    function isInWordList(word) {
      return (WORD_LIST[word.length] || []).includes(word);
    }

    function pickWord() {
      const lengths = [4, 5, 6];
      const len = lengths[Math.floor(Math.random() * lengths.length)];
      const pool = WORD_LIST[len].filter(w => w !== lastWord);
      return pool[Math.floor(Math.random() * pool.length)];
    }

    // ===== グリッド =====
    let gridCells = [];

    function buildGrid() {
      // セルサイズをレスポンシブに決定
      const gap       = 7;
      const padding   = 32;
      const maxCell   = 58;
      const available = Math.min(window.innerWidth - padding, 448 - padding);
      const totalGap  = gap * (wordLength - 1);
      const cellSize  = Math.min(maxCell, Math.floor((available - totalGap) / wordLength));

      gridContainer.style.setProperty("--cell-size", cellSize + "px");
      gridContainer.style.setProperty("--gap", gap + "px");

      gridContainer.innerHTML = "";
      gridCells = [];

      for (let r = 0; r < maxAttempts; r++) {
        const row = document.createElement("div");
        row.classList.add("grid-row");
        const cells = [];
        for (let c = 0; c < wordLength; c++) {
          const cell = document.createElement("div");
          cell.classList.add("cell");
          row.appendChild(cell);
          cells.push(cell);
        }
        gridContainer.appendChild(row);
        gridCells.push(cells);
      }
      setActiveRow(0);
    }

    function setActiveRow(rowIndex) {
      gridCells.forEach((cells, r) => {
        cells.forEach(cell => {
          cell.classList.toggle("active-row", r === rowIndex);
        });
      });
    }

    // ===== 判定ロジック(標準Wordleアルゴリズム) =====
    function evaluate(guess, target) {
      const result      = new Array(wordLength).fill("absent");
      const targetUsed  = new Array(wordLength).fill(false);
      const guessUsed   = new Array(wordLength).fill(false);

      for (let i = 0; i < wordLength; i++) {
        if (guess[i] === target[i]) {
          result[i]     = "correct";
          targetUsed[i] = true;
          guessUsed[i]  = true;
        }
      }

      for (let i = 0; i < wordLength; i++) {
        if (guessUsed[i]) continue;
        for (let j = 0; j < wordLength; j++) {
          if (targetUsed[j]) continue;
          if (guess[i] === target[j]) {
            result[i]     = "present";
            targetUsed[j] = true;
            break;
          }
        }
      }

      return result;
    }

    // ===== セルに色付け(判を押す演出) =====
    function colorRow(rowIndex, guess, result) {
      const cells = gridCells[rowIndex];
      for (let i = 0; i < wordLength; i++) {
        const cell = cells[i];
        cell.innerHTML = `<span>${guess[i]}</span>`;
        cell.classList.remove("active-row", "has-char");

        // 1文字ずつ時間差で印を押す
        const delay = i * 130;
        setTimeout(() => {
          cell.classList.add(result[i]);
          cell.classList.add("kotodama-reveal");
        }, delay);
      }
    }

    // ===== ライブプレビュー(タイピング中にグリッドへ反映) =====
    function updatePreview() {
      if (gameOver) return;
      const val   = guessInput.value;
      const cells = gridCells[currentAttempt];
      if (!cells) return;

      for (let i = 0; i < wordLength; i++) {
        const char = val[i] || "";
        if (char) {
          cells[i].innerHTML = `<span>${char}</span>`;
          cells[i].classList.add("has-char");
        } else {
          cells[i].innerHTML = "";
          cells[i].classList.remove("has-char");
        }
      }
    }

    // ===== メッセージ =====
    function showMessage(text, type) {
      messageArea.textContent = text;
      messageArea.className   = type || "";
    }

    // ===== 推測処理 =====
    function submitGuess() {
      if (gameOver) return;

      const guess = guessInput.value.trim();
      guessInput.value = "";
      updatePreview();

      if (guess.length !== wordLength) {
        showMessage(`${wordLength}文字で入力してください。（現在 ${guess.length} 文字）`, "error");
        guessInput.focus();
        return;
      }

      if (!isHiragana(guess)) {
        showMessage("ひらがなのみで入力してください。", "error");
        guessInput.focus();
        return;
      }

      const result = evaluate(guess, targetWord);
      colorRow(currentAttempt, guess, result);
      currentAttempt++;

      const revealEnd = (wordLength - 1) * 130 + 300;

      if (result.every(r => r === "correct")) {
        gameOver = true;
        const tries = currentAttempt;
        setTimeout(() => {
          showMessage(`霊力を解き明かした！「${targetWord}」を ${tries} 回で見抜いた。`, "success");
          endGame();
        }, revealEnd);
        return;
      }

      if (currentAttempt >= maxAttempts) {
        gameOver = true;
        setTimeout(() => {
          showMessage(`言霊が逃げた……正解は「${targetWord}」。`, "fail");
          endGame();
        }, revealEnd);
        return;
      }

      setActiveRow(currentAttempt);
      const remaining = maxAttempts - currentAttempt;
      showMessage(`残り ${remaining} 回`, "info");
      guessInput.focus();
    }

    // ===== ゲーム終了 =====
    function endGame() {
      submitBtn.disabled      = true;
      guessInput.disabled     = true;
      replayBtn.style.display = "inline-block";
      lastWord = targetWord;
    }

    // ===== ゲーム開始 =====
    function startGame() {
      targetWord      = pickWord();
      wordLength      = targetWord.length;
      maxAttempts     = wordLength + 4;
      currentAttempt  = 0;
      gameOver        = false;

      guessInput.disabled     = false;
      guessInput.value        = "";
      submitBtn.disabled      = false;
      replayBtn.style.display = "none";

      buildGrid();
      showMessage(`${wordLength}文字の言霊を当てよ。（最大 ${maxAttempts} 回）`, "info");
      guessInput.focus();
    }

    // ===== イベント =====
    submitBtn.addEventListener("click", submitGuess);

    guessInput.addEventListener("input", updatePreview);

    guessInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        submitGuess();
      }
    });

    replayBtn.addEventListener("click", startGame);

    // ===== 初回起動 =====
    startGame();
  </script>
</body>
</html>
