<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>ことだまリドル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ========== リセット & カスタムプロパティ ========== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --sumi:      #14151a;  /* 墨色(背景) */
      --washi:     #f3ead9;  /* 生成り/和紙色 */
      --shu:       #c8372e;  /* 朱色(正解) */
      --kogane:    #c9a227;  /* 黄金(位置違い) */
      --sumiNezumi:#6b6f76;  /* 墨鼠(不正解) */
    }

    /* ========== ベース ========== */
    html, body {
      height: 100%;
    }

    body {
      font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: var(--sumi);
      color: var(--washi);
      overflow: hidden;
    }

    /* ========== アプリシェル ========== */
    #app-shell {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========== ヘッダー ========== */
    header {
      width: 100%;
      text-align: center;
      padding: 28px 16px 22px;
      position: relative;
    }

    .title-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* 朱色の細線(上部装飾) */
    .title-rule {
      width: 48px;
      height: 1px;
      background: var(--shu);
      opacity: 0.7;
    }

    .title-kana {
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-weight: 800;
      font-size: clamp(1.9rem, 7.5vw, 2.5rem);
      letter-spacing: 0.22em;
      color: var(--washi);
      line-height: 1;
      text-indent: 0.22em; /* letter-spacing による右のズレ補正 */
    }

    .title-sub {
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      color: var(--sumiNezumi);
      text-indent: 0.28em;
    }

    /* ========== メインコンテンツ ========== */
    main {
      width: 100%;
      max-width: 480px;
      padding: 0 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* ========== 凡例 ========== */
    #legend {
      display: flex;
      gap: 14px;
      font-size: 0.72rem;
      color: var(--sumiNezumi);
      flex-wrap: wrap;
      justify-content: center;
      letter-spacing: 0.04em;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legend-swatch.correct  { background: var(--shu); }
    .legend-swatch.present  { background: var(--kogane); }
    .legend-swatch.absent   { background: var(--sumiNezumi); }

    /* ========== グリッド ========== */
    #grid-container {
      display: flex;
      flex-direction: column;
      gap: var(--gap, 7px);
    }

    .grid-row {
      display: flex;
      gap: var(--gap, 7px);
    }

    /* セル基本 */
    .cell {
      width: var(--cell-size, 56px);
      height: var(--cell-size, 56px);
      border: 1.5px solid rgba(243, 234, 217, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-size: calc(var(--cell-size, 56px) * 0.42);
      font-weight: 700;
      border-radius: 4px;
      background: transparent;
      color: var(--washi);
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* タイピング中(文字がある)セル */
    .cell.has-char {
      border-color: rgba(243, 234, 217, 0.32);
      background: rgba(243, 234, 217, 0.05);
    }

    /* アクティブ行 */
    .cell.active-row {
      border-color: rgba(243, 234, 217, 0.28);
    }

    /* 文字を擬似要素の手前に */
    .cell > span {
      position: relative;
      z-index: 1;
    }

    /* ===== 朱色・正解: 判を押す演出 ===== */
    .cell.correct {
      border-color: var(--shu);
      color: var(--washi);
      transition: none;
      animation: hankoPress 0.52s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    /* 朱印の広がり(墨汁がにじむように中心から外へ) */
    .cell.correct::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--shu);
      border-radius: 2px;
      transform: scale(0);
      transform-origin: center;
      animation: inkBleed 0.46s ease-out forwards;
      z-index: 0;
    }

    /* ===== 黄金・位置違い: 判を柔らかく押す演出 ===== */
    /* 正解より長い duration で同じ keyframe を使い、柔らかい圧を表現 */
    .cell.present {
      background: var(--kogane);
      border-color: var(--kogane);
      color: var(--sumi);
      animation: hankoPress 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    /* ===== 墨鼠・不正解 ===== */
    .cell.absent {
      background: rgba(107, 111, 118, 0.22);
      border-color: rgba(107, 111, 118, 0.38);
      color: rgba(243, 234, 217, 0.38);
    }

    /* ===== 判を押すアニメーション ===== */
    /* 圧縮 → 跳ね返り → 余韻 */
    @keyframes hankoPress {
      0%   { transform: scale(1); }
      16%  { transform: scale(0.86); }
      38%  { transform: scale(1.08); }
      58%  { transform: scale(0.96); }
      78%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    /* 朱印の広がり: 中心から外へにじみ出る */
    @keyframes inkBleed {
      0%   { transform: scale(0);    opacity: 1; }
      55%  { transform: scale(1.1);  opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }

    /* ===== 言霊が宿る - 段階的強度エフェクト ===== */
    /* CSS カスタムプロパティでスケール・透明度を調整し、同一 keyframe で三段階の強度を表現 */

    /* absent: 控えめ(不一致でも霊は微かに宿る) */
    .cell.kotodama-reveal::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(243, 234, 217, 0.1);
      pointer-events: none;
      z-index: 0;
      /* デフォルト変数(absent 基準) */
      --spirit-start: 0.55;
      --spirit-peak:  0.95;
      --spirit-peak-opacity: 0.28;
      animation: kotodamaSpirit 0.65s ease-out forwards;
    }

    /* present: 中程度 - 黄金の霊光が揺れながら宿る */
    .cell.present.kotodama-reveal::after {
      background: rgba(201, 162, 39, 0.45);
      animation-duration: 1.05s;
      --spirit-start: 0.40;
      --spirit-peak:  1.12;
      --spirit-peak-opacity: 0.72;
    }

    /* correct: 強 - 朱の霊光が力強く広がって宿る */
    .cell.correct.kotodama-reveal::after {
      background: rgba(243, 234, 217, 0.6);
      animation-duration: 1.42s;
      --spirit-start: 0.30;
      --spirit-peak:  1.28;
      --spirit-peak-opacity: 1.0;
    }

    @keyframes kotodamaSpirit {
      0%   { opacity: 0;                              transform: scale(var(--spirit-start, 0.45)); }
      25%  { opacity: var(--spirit-peak-opacity, 0.65); transform: scale(var(--spirit-peak, 1.0)); }
      100% { opacity: 0;                              transform: scale(var(--spirit-peak, 1.0)); }
    }

    /* ========== 入力エリア (アプリシェル最下部) ========== */
    #input-area {
      display: flex;
      gap: 10px;
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      background: var(--sumi);
      border-top: 1px solid rgba(243, 234, 217, 0.1);
      z-index: 100;
      width: 100%;
      flex-shrink: 0;
    }

    #guess-input {
      flex: 1;
      padding: 14px 14px;
      font-size: 1.22rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 500;
      background: rgba(243, 234, 217, 0.05);
      border: 1.5px solid rgba(243, 234, 217, 0.18);
      border-radius: 5px;
      color: var(--washi);
      outline: none;
      text-align: center;
      letter-spacing: 0.18em;
      transition: border-color 0.2s, background 0.2s;
      caret-color: var(--shu);
      min-width: 0;
    }

    #guess-input::placeholder {
      color: rgba(243, 234, 217, 0.22);
      letter-spacing: 0.04em;
      font-size: 0.9rem;
    }

    #guess-input:focus {
      border-color: rgba(243, 234, 217, 0.42);
      background: rgba(243, 234, 217, 0.07);
    }

    #guess-input:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #submit-btn {
      padding: 14px 20px;
      background: var(--shu);
      color: var(--washi);
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.12em;
      cursor: pointer;
      white-space: nowrap;
      min-width: 80px;
      transition: opacity 0.18s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    #submit-btn:hover:not(:disabled) {
      opacity: 0.82;
    }

    #submit-btn:active:not(:disabled) {
      transform: scale(0.94);
    }

    #submit-btn:disabled {
      background: rgba(107, 111, 118, 0.5);
      cursor: not-allowed;
    }

    /* ========== メッセージエリア ========== */
    #message-area {
      min-height: 36px;
      text-align: center;
      padding: 7px 18px;
      border-radius: 5px;
      width: 100%;
      max-width: 420px;
      line-height: 1.5;
      letter-spacing: 0.06em;
      font-size: 0.85rem;
    }

    #message-area.error {
      background: rgba(200, 55, 46, 0.12);
      color: #e8807a;
      border: 1px solid rgba(200, 55, 46, 0.28);
    }

    #message-area.info {
      background: rgba(243, 234, 217, 0.05);
      color: rgba(243, 234, 217, 0.55);
      border: 1px solid rgba(243, 234, 217, 0.1);
    }

    #message-area.success {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 1.02rem;
      font-weight: 700;
      background: rgba(200, 55, 46, 0.1);
      color: var(--washi);
      border: 1px solid rgba(200, 55, 46, 0.35);
    }

    #message-area.fail {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 0.97rem;
      font-weight: 700;
      background: rgba(107, 111, 118, 0.12);
      color: rgba(243, 234, 217, 0.65);
      border: 1px solid rgba(107, 111, 118, 0.28);
    }

    /* ========== ジャンルヒント ========== */
    #genre-hint {
      display: none;
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--sumiNezumi);
      padding: 5px 16px;
      border-radius: 4px;
      border: 1px dashed rgba(107, 111, 118, 0.28);
      background: rgba(107, 111, 118, 0.05);
      width: 100%;
      max-width: 420px;
    }

    #genre-hint.visible {
      display: block;
      animation: genreHintFadeIn 0.9s ease-out forwards;
    }

    @keyframes genreHintFadeIn {
      0%   { opacity: 0; transform: translateY(-4px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ========== フッター / リプレイ ========== */
    footer {
      padding-bottom: 44px;
    }

    #replay-btn {
      display: none;
      padding: 15px 44px;
      background: transparent;
      color: var(--washi);
      border: 1.5px solid rgba(243, 234, 217, 0.3);
      border-radius: 5px;
      font-size: 0.95rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.16em;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #replay-btn:hover {
      border-color: rgba(243, 234, 217, 0.6);
      background: rgba(243, 234, 217, 0.05);
    }

    #replay-btn:active {
      transform: scale(0.97);
    }

    /* ========== 完全正解 - 言霊解放エフェクト ========== */

    /* 衝撃波リング: 中心から画面全体へ広がる */
    @keyframes shockwaveExpand {
      0%   { transform: scale(1);   opacity: 1;   }
      70%  { opacity: 0.6; }
      100% { transform: scale(200); opacity: 0;   }
    }

    /* 背景フラッシュ */
    @keyframes perfectFlash {
      0%   { opacity: 0; }
      12%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* グリッド全体発光 */
    .perfect-glow {
      animation: gridPerfectGlow 1.9s ease-out forwards;
    }

    @keyframes gridPerfectGlow {
      0%   { filter: brightness(1);   drop-shadow(0 0  0px transparent); }
      18%  { filter: brightness(2.8)  drop-shadow(0 0 32px var(--kogane)); }
      45%  { filter: brightness(2.0)  drop-shadow(0 0 22px var(--shu)); }
      70%  { filter: brightness(1.4)  drop-shadow(0 0 12px var(--kogane)); }
      100% { filter: brightness(1)    drop-shadow(0 0  0px transparent); }
    }

    /* テキストオーバーレイ */
    .perfect-text-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 1000;
      animation: perfectTextFade 2.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .perfect-kanji {
      display: block;
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-weight: 800;
      font-size: clamp(4rem, 19vw, 7.5rem);
      letter-spacing: 0.18em;
      text-indent: 0.18em;
      line-height: 1;
      background: linear-gradient(150deg, var(--kogane) 0%, var(--washi) 48%, var(--shu) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(201,162,39,0.75)) drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    .perfect-word {
      display: block;
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-weight: 700;
      font-size: clamp(1.9rem, 8.5vw, 3.4rem);
      letter-spacing: 0.28em;
      text-indent: 0.28em;
      color: var(--washi);
      margin-top: 18px;
      opacity: 0.88;
      text-shadow: 0 0 16px rgba(201,162,39,0.5);
    }

    @keyframes perfectTextFade {
      0%   { opacity: 0; transform: scale(0.55); }
      14%  { opacity: 1; transform: scale(1.07); }
      24%  { transform: scale(1); }
      68%  { opacity: 1; }
      100% { opacity: 0; transform: scale(1.04) translateY(-6px); }
    }
  </style>
</head>
<body>

  <div id="app-shell">
    <div id="scroll-area">
      <header>
        <div class="title-wrap">
          <div class="title-rule"></div>
          <h1 class="title-kana">ことだまリドル</h1>
          <p class="title-sub">言葉に宿る霊力を解き明かせ</p>
          <div class="title-rule"></div>
        </div>
      </header>

      <main>
        <div id="legend">
          <div class="legend-item">

          </div>
          <div class="legend-item">
            <div class="legend-swatch absent"></div>
            <span>含まれない文字</span>
          </div>
        </div>

        <div id="message-area"></div>

        <div id="genre-hint"></div>

        <div id="grid-container"></div>
      </main>

      <footer>
        <button id="replay-btn">再び唱える</button>
      </footer>
    </div>

    <div id="input-area">
      <input
        type="text"
        id="guess-input"
        placeholder="ひらがなで入力"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <button id="submit-btn">唱える</button>
    </div>
  </div>

    // ===== ゲーム状態 =====
    let targetWord    = "";
    let wordLength    = 0;
    let maxAttempts   = 0;
    let currentAttempt = 0;
    let gameOver        = false;
    let lastWord        = "";
    let currentGenre    = "";
    let genreHintShown  = false;

    // ===== DOM =====
    const gridContainer = document.getElementById("grid-container");
    const guessInput    = document.getElementById("guess-input");
    const submitBtn     = document.getElementById("submit-btn");
    const messageArea   = document.getElementById("message-area");
    const replayBtn     = document.getElementById("replay-btn");

    // ===== ユーティリティ =====
    function isHiragana(str) {
      return /^[ぁ-ゖー]+$/.test(str);
    }

    function isInWordList(word) {
      return word in WORDS_WITH_GENRE;
    }

    function pickWord() {
      const lengths = [4, 5, 6];
      const len = lengths[Math.floor(Math.random() * lengths.length)];
      const pool = Object.keys(WORDS_WITH_GENRE).filter(
        w => WORDS_WITH_GENRE[w].length === len && w !== lastWord
      );
      return pool[Math.floor(Math.random() * pool.length)];
    }

    // ===== グリッド =====
    let gridCells = [];

    function buildGrid() {
      // セルサイズをレスポンシブに決定
      const gap       = 7;
      const padding   = 32;
      const maxCell   = 58;
      const available = Math.min(window.innerWidth - padding, 448 - padding);
      const totalGap  = gap * (wordLength - 1);
      const cellSize  = Math.min(maxCell, Math.floor((available - totalGap) / wordLength));

      gridContainer.style.setProperty("--cell-size", cellSize + "px");
      gridContainer.style.setProperty("--gap", gap + "px");

      gridContainer.innerHTML = "";
      gridCells = [];

      for (let r = 0; r < maxAttempts; r++) {
        const row = document.createElement("div");
        row.classList.add("grid-row");
        const cells = [];
        for (let c = 0; c < wordLength; c++) {
          const cell = document.createElement("div");
          cell.classList.add("cell");
          row.appendChild(cell);
          cells.push(cell);
        }
        gridContainer.appendChild(row);
        gridCells.push(cells);
      }
      setActiveRow(0);
    }

    function setActiveRow(rowIndex) {
      gridCells.forEach((cells, r) => {
        cells.forEach(cell => {
          cell.classList.toggle("active-row", r === rowIndex);
        });
      });
    }

    // ===== 判定ロジック(標準Wordleアルゴリズム) =====
    function evaluate(guess, target) {
      const result      = new Array(wordLength).fill("absent");
      const targetUsed  = new Array(wordLength).fill(false);
      const guessUsed   = new Array(wordLength).fill(false);

      for (let i = 0; i < wordLength; i++) {
        if (guess[i] === target[i]) {
          result[i]     = "correct";
          targetUsed[i] = true;
          guessUsed[i]  = true;
        }
      }

      for (let i = 0; i < wordLength; i++) {
        if (guessUsed[i]) continue;
        for (let j = 0; j < wordLength; j++) {
          if (targetUsed[j]) continue;
          if (guess[i] === target[j]) {
            result[i]     = "present";
            targetUsed[j] = true;
            break;
          }
        }
      }

      return result;
    }

    // ===== セルに色付け(判を押す演出) =====
    function colorRow(rowIndex, guess, result) {
      const cells = gridCells[rowIndex];
      for (let i = 0; i < wordLength; i++) {
        const cell = cells[i];
        cell.innerHTML = `<span>${guess[i]}</span>`;
        cell.classList.remove("active-row", "has-char");

        // 1文字ずつ時間差で印を押す
        const delay = i * 130;
        setTimeout(() => {
          cell.classList.add(result[i]);
          cell.classList.add("kotodama-reveal");
        }, delay);
      }
    }

    // ===== ライブプレビュー(タイピング中にグリッドへ反映) =====
    function updatePreview() {
      if (gameOver) return;
      const val   = guessInput.value;
      const cells = gridCells[currentAttempt];
      if (!cells) return;

      for (let i = 0; i < wordLength; i++) {
        const char = val[i] || "";
        if (char) {
          cells[i].innerHTML = `<span>${char}</span>`;
          cells[i].classList.add("has-char");
        } else {
          cells[i].innerHTML = "";
          cells[i].classList.remove("has-char");
        }
      }
    }

    // ===== メッセージ =====
    function showMessage(text, type) {
      messageArea.textContent = text;
      messageArea.className   = type || "";
    }

    // ===== ジャンルヒント表示 =====
    function showGenreHint() {
      genreHintEl.textContent = `ジャンル：${currentGenre}`;
      genreHintEl.classList.remove("visible");
      // リフロー強制で再アニメーション保証
      void genreHintEl.offsetWidth;
      genreHintEl.classList.add("visible");
    }

    // ===== 完全正解エフェクト: 言霊解放 =====
    function triggerPerfectEffect(word, onComplete) {
      const gridRect = gridContainer.getBoundingClientRect();
      const cx = gridRect.left + gridRect.width  / 2;
      const cy = gridRect.top  + gridRect.height / 2;

      // --- 衝撃波リング (4本・時間差) ---
      const ringColors = ['var(--shu)', 'var(--kogane)', 'var(--washi)', 'var(--shu)'];
      for (let i = 0; i < 4; i++) {
        const ring = document.createElement('div');
        Object.assign(ring.style, {
          position:     'fixed',
          left:         cx + 'px',
          top:          cy + 'px',
          width:        '8px',
          height:       '8px',
          marginLeft:   '-4px',
          marginTop:    '-4px',
          borderRadius: '50%',
          border:       `2px solid ${ringColors[i]}`,
          pointerEvents:'none',
          zIndex:       '995',
          animationName:'shockwaveExpand',
          animationDuration: `${0.85 + i * 0.22}s`,
          animationTimingFunction: 'cubic-bezier(0.12, 0.5, 0.3, 1)',
          animationDelay: `${i * 150}ms`,
          animationFillMode: 'forwards',
        });
        document.body.appendChild(ring);
        setTimeout(() => ring.remove(), 2200);
      }

      // --- 背景フラッシュ ---
      const flash = document.createElement('div');
      Object.assign(flash.style, {
        position:   'fixed',
        inset:      '0',
        background: `radial-gradient(circle at ${cx}px ${cy}px,
                      rgba(243,234,217,0.94)  0%,
                      rgba(201,162,39,0.52)  26%,
                      rgba(200,55,46,0.22)   52%,
                      transparent            70%)`,
        pointerEvents: 'none',
        zIndex:      '994',
        animationName: 'perfectFlash',
        animationDuration: '0.88s',
        animationTimingFunction: 'ease-out',
        animationFillMode: 'forwards',
      });
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 1100);

      // --- パーティクルバースト (Canvas) ---
      const canvas = document.createElement('canvas');
      Object.assign(canvas.style, {
        position:      'fixed',
        inset:         '0',
        width:         '100%',
        height:        '100%',
        pointerEvents: 'none',
        zIndex:        '996',
      });
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      const ctx2 = canvas.getContext('2d');

      const palette = ['#c8372e','#c9a227','#f3ead9','#e8807a','#ffd085','#ffffff','#ffb347'];
      const particles = [];

      // メインパーティクル: 全方向に均等放出
      for (let i = 0; i < 200; i++) {
        const angle = (Math.PI * 2 * i / 200) + (Math.random() - 0.5) * 0.38;
        const speed = 3.5 + Math.random() * 11;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 1.5,
          r: 2.5 + Math.random() * 5.5,
          color: palette[Math.floor(Math.random() * palette.length)],
          life: 0.88 + Math.random() * 0.12,
          decay: 0.006 + Math.random() * 0.013,
          shape: Math.random() < 0.45 ? 'rect' : 'circle',
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.24,
        });
      }

      // キラキラ: 光の筋 (细长条状)
      for (let i = 0; i < 80; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 7;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 0.8,
          w: 1.2 + Math.random() * 2,
          h: 5 + Math.random() * 13,
          r: 0,
          color: Math.random() < 0.55 ? '#c9a227' : '#f3ead9',
          life: 0.82 + Math.random() * 0.18,
          decay: 0.005 + Math.random() * 0.011,
          shape: 'streak',
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.35,
        });
      }

      let rafId;
      function animParticles() {
        ctx2.clearRect(0, 0, canvas.width, canvas.height);
        let anyAlive = false;
        for (const p of particles) {
          if (p.life <= 0) continue;
          anyAlive = true;
          p.x  += p.vx;
          p.y  += p.vy;
          p.vy += 0.2;
          p.vx *= 0.988;
          p.life -= p.decay;
          p.rot  += p.rotV;
          const alpha = Math.max(0, p.life * p.life);

          ctx2.save();
          ctx2.globalAlpha = alpha;
          ctx2.fillStyle   = p.color;
          ctx2.translate(p.x, p.y);
          ctx2.rotate(p.rot);
          if (p.shape === 'rect') {
            ctx2.fillRect(-p.r, -p.r * 0.42, p.r * 2, p.r * 0.84);
          } else if (p.shape === 'streak') {
            ctx2.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          } else {
            ctx2.beginPath();
            ctx2.arc(0, 0, p.r, 0, Math.PI * 2);
            ctx2.fill();
          }
          ctx2.restore();
        }
        if (anyAlive) {
          rafId = requestAnimationFrame(animParticles);
        } else {
          cancelAnimationFrame(rafId);
          canvas.remove();
        }
      }
      animParticles();

      // --- グリッドグロー ---
      gridContainer.classList.add('perfect-glow');
      setTimeout(() => gridContainer.classList.remove('perfect-glow'), 1900);

      // --- テキストオーバーレイ ---
      const textEl = document.createElement('div');
      textEl.className = 'perfect-text-overlay';
      textEl.innerHTML = `<span class="perfect-kanji">言霊解放</span><span class="perfect-word">「${word}」</span>`;
      document.body.appendChild(textEl);
      setTimeout(() => textEl.remove(), 2600);

      setTimeout(onComplete, 2000);
    }

    // ===== 推測処理 =====
    function submitGuess() {
      if (gameOver) return;

      const guess = guessInput.value.trim();
      guessInput.value = "";
      updatePreview();

      if (guess.length !== wordLength) {
        showMessage(`${wordLength}文字で入力してください。（現在 ${guess.length} 文字）`, "error");
        guessInput.focus();
        return;
      }

      if (!isHiragana(guess)) {
        showMessage("ひらがなのみで入力してください。", "error");
        guessInput.focus();
        return;
      }

      const result = evaluate(guess, targetWord);
      colorRow(currentAttempt, guess, result);
      currentAttempt++;

      const revealEnd = (wordLength - 1) * 130 + 300;

      if (result.every(r => r === "correct")) {
        gameOver = true;
        const tries = currentAttempt;
        setTimeout(() => {
          triggerPerfectEffect(targetWord, () => {
            showMessage(`霊力を解き明かした！「${targetWord}」を ${tries} 回で見抜いた。`, "success");
            endGame();
          });
        }, revealEnd);
        return;
      }

      if (currentAttempt >= maxAttempts) {
        gameOver = true;
        setTimeout(() => {
          showMessage(`言霊が逃げた……正解は「${targetWord}」。`, "fail");
          endGame();
        }, revealEnd);
        return;
      }

      setActiveRow(currentAttempt);
      const remaining = maxAttempts - currentAttempt;
      showMessage(`残り ${remaining} 回`, "info");

      // 試行回数が最大の半分に達した時点でジャンルヒントを1回だけ表示
      if (!genreHintShown && currentAttempt === Math.ceil(maxAttempts / 2)) {
        genreHintShown = true;
        setTimeout(() => showGenreHint(), revealEnd);
      }

      guessInput.focus();
    }

    // ===== ゲーム終了 =====
    function endGame() {
      submitBtn.disabled      = true;
      guessInput.disabled     = true;
      replayBtn.style.display = "inline-block";
      lastWord = targetWord;
    }

    // ===== ゲーム開始 =====
    function startGame() {
      targetWord      = pickWord();
      wordLength      = WORDS_WITH_GENRE[targetWord].length;
      currentGenre    = WORDS_WITH_GENRE[targetWord].genre;
      maxAttempts     = wordLength + 7;
      currentAttempt  = 0;
      gameOver        = false;

      genreHintShown  = false;
      genreHintEl.textContent = "";
      genreHintEl.classList.remove("visible");

      guessInput.disabled     = false;
      guessInput.value        = "";
      submitBtn.disabled      = false;
      replayBtn.style.display = "none";

      buildGrid();
      showMessage(`${wordLength}文字の言霊を当てよ。（最大 ${maxAttempts} 回）`, "info");
      guessInput.focus();
    }

    // ===== イベント =====
    submitBtn.addEventListener("click", submitGuess);

    guessInput.addEventListener("input", updatePreview);

    guessInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        submitGuess();
      }
    });

    replayBtn.addEventListener("click", startGame);

    // ===== 初回起動 =====
    startGame();

    // ===== キーボード表示時にアプリシェルをビジュアルビューポートに追従 (iOS対応) =====
    const appShell = document.getElementById("app-shell");

    function adjustForKeyboard() {
      if (!window.visualViewport) return;
      const vv = window.visualViewport;
      appShell.style.height = vv.height + "px";
      appShell.style.top = (vv.offsetTop || 0) + "px";
    }

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", adjustForKeyboard);
      window.visualViewport.addEventListener("scroll", adjustForKeyboard);
    }
    adjustForKeyboard();

    // キーボード表示後にアクティブ行をスクロールで見えるようにする
    guessInput.addEventListener("focus", () => {
      setTimeout(() => {
        if (gridCells[currentAttempt]) {
          gridCells[currentAttempt][0].scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }, 350);
    });
  </script>
</body>
</html>
