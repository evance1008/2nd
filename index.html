<!DOCTYPE html>
<!--
  ===== HTML 目次 =====
  SECTION: ヘッダー
  SECTION: メインゲームエリア
  SECTION: フッター・リプレイ
  SECTION: 入力エリア
  SECTION: スタート画面
  =====
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>ことだまリドル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /*
     * ===== CSS 目次 =====
     * SECTION: リセット・カスタムプロパティ
     * SECTION: ベース・レイアウト
     * SECTION: アプリシェル
     * SECTION: ヘッダー
     * SECTION: メインコンテンツ
     * SECTION: 凡例
     * SECTION: グリッド・セル
     * SECTION: 言霊エフェクト（段階的強度）
     * SECTION: 入力エリア
     * SECTION: メッセージエリア
     * SECTION: ジャンルヒント
     * SECTION: フッター・リプレイ
     * SECTION: 完全正解エフェクト（言霊解放）
     * SECTION: スタート画面
     * SECTION: テストモードバナー
     * =====
     */

    /* ===== SECTION: リセット・カスタムプロパティ ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --sumi:      #14151a;  /* 墨色(背景) */
      --washi:     #f3ead9;  /* 生成り/和紙色 */
      --shu:       #c8372e;  /* 朱色(正解) */
      --kogane:    #c9a227;  /* 黄金(位置違い) */
      --sumiNezumi:#6b6f76;  /* 墨鼠(不正解) */
      --honoo:     #fdfdfb;  /* 言霊(青い炎)のコア中心色 */
      --honooAo:   #a9dcff;  /* 言霊(青い炎)の外縁・青みがかった色 */
      --honooKon:  #2f6bff;  /* 言霊(青い炎)の穂先・深い青色 */
    }

    /* ===== SECTION: ベース・レイアウト ===== */
    html, body {
      height: 100%;
    }

    body {
      font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: var(--sumi);
      color: var(--washi);
      overflow: hidden;
    }

    /* ===== SECTION: アプリシェル ===== */
    #app-shell {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #scroll-area {
      position: relative; /* 完全正解エフェクト(筆致)の座標基準にする */
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== SECTION: ヘッダー ===== */
    header {
      width: 100%;
      text-align: center;
      padding: 28px 16px 22px;
      position: relative;
    }

    .title-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* 朱色の細線(上部装飾) */
    .title-rule {
      width: 48px;
      height: 1px;
      background: var(--shu);
      opacity: 0.7;
    }

    .title-kana {
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-weight: 800;
      font-size: clamp(1.9rem, 7.5vw, 2.5rem);
      letter-spacing: 0.22em;
      color: var(--washi);
      line-height: 1;
      text-indent: 0.22em; /* letter-spacing による右のズレ補正 */
    }

    .title-sub {
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      color: var(--sumiNezumi);
      text-indent: 0.28em;
    }

    /* ===== SECTION: メインコンテンツ ===== */
    main {
      width: 100%;
      max-width: 480px;
      padding: 0 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* ===== SECTION: 凡例 ===== */
    #legend {
      display: flex;
      gap: 14px;
      font-size: 0.72rem;
      color: var(--sumiNezumi);
      flex-wrap: wrap;
      justify-content: center;
      letter-spacing: 0.04em;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legend-swatch.correct  { background: var(--shu); }
    .legend-swatch.present  { background: var(--kogane); }
    .legend-swatch.absent   { background: var(--sumiNezumi); }

    /* ===== SECTION: グリッド・セル ===== */
    #grid-container {
      display: flex;
      flex-direction: column;
      gap: var(--gap, 7px);
    }

    .grid-row {
      display: flex;
      gap: var(--gap, 7px);
    }

    /* セル基本 */
    .cell {
      width: var(--cell-size, 56px);
      height: var(--cell-size, 56px);
      border: 1.5px solid rgba(243, 234, 217, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
      font-size: calc(var(--cell-size, 56px) * 0.42);
      font-weight: 700;
      border-radius: 4px;
      background: transparent;
      color: var(--washi);
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    /* タイピング中(文字がある)セル */
    .cell.has-char {
      border-color: rgba(243, 234, 217, 0.32);
      background: rgba(243, 234, 217, 0.05);
    }

    /* アクティブ行 */
    .cell.active-row {
      border-color: rgba(243, 234, 217, 0.28);
    }

    /* 文字を擬似要素の手前に */
    .cell > span {
      position: relative;
      z-index: 1;
    }

    /* --- サブ: 朱色・正解（判を押す演出） --- */
    .cell.correct {
      border-color: var(--shu);
      color: var(--washi);
      transition: none;
      animation: hankoPress 0.52s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    /* 朱印の広がり(墨汁がにじむように中心から外へ) */
    .cell.correct::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--shu);
      border-radius: 2px;
      transform: scale(0);
      transform-origin: center;
      animation: inkBleed 0.46s ease-out forwards;
      z-index: 0;
    }

    /* --- サブ: 黄金・位置違い（判を柔らかく押す演出） --- */
    /* 正解より長い duration で同じ keyframe を使い、柔らかい圧を表現 */
    .cell.present {
      background: var(--kogane);
      border-color: var(--kogane);
      color: var(--sumi);
      animation: hankoPress 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    /* --- サブ: 墨鼠・不正解 --- */
    .cell.absent {
      background: rgba(107, 111, 118, 0.22);
      border-color: rgba(107, 111, 118, 0.38);
      color: rgba(243, 234, 217, 0.38);
    }

    /* --- サブ: アニメーション（判を押す） --- */
    /* 圧縮 → 跳ね返り → 余韻 */
    @keyframes hankoPress {
      0%   { transform: scale(1); }
      16%  { transform: scale(0.86); }
      38%  { transform: scale(1.08); }
      58%  { transform: scale(0.96); }
      78%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    /* 朱印の広がり: 中心から外へにじみ出る */
    @keyframes inkBleed {
      0%   { transform: scale(0);    opacity: 1; }
      55%  { transform: scale(1.1);  opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }

    /* ===== SECTION: 言霊エフェクト（段階的強度） ===== */
    /* CSS カスタムプロパティでスケール・透明度を調整し、同一 keyframe で三段階の強度を表現 */

    /* absent: 控えめ(不一致でも霊は微かに宿る) */
    .cell.kotodama-reveal::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(243, 234, 217, 0.1);
      pointer-events: none;
      z-index: 0;
      /* デフォルト変数(absent 基準) */
      --spirit-start: 0.55;
      --spirit-peak:  0.95;
      --spirit-peak-opacity: 0.28;
      animation: kotodamaSpirit 0.65s ease-out forwards;
    }

    /* present: 中程度 - 黄金の霊光が揺れながら宿る */
    .cell.present.kotodama-reveal::after {
      background: rgba(201, 162, 39, 0.45);
      animation-duration: 1.05s;
      --spirit-start: 0.40;
      --spirit-peak:  1.12;
      --spirit-peak-opacity: 0.72;
    }

    /* correct: 強 - 朱の霊光が力強く広がって宿る */
    .cell.correct.kotodama-reveal::after {
      background: rgba(243, 234, 217, 0.6);
      animation-duration: 1.42s;
      --spirit-start: 0.30;
      --spirit-peak:  1.28;
      --spirit-peak-opacity: 1.0;
    }

    @keyframes kotodamaSpirit {
      0%   { opacity: 0;                              transform: scale(var(--spirit-start, 0.45)); }
      25%  { opacity: var(--spirit-peak-opacity, 0.65); transform: scale(var(--spirit-peak, 1.0)); }
      100% { opacity: 0;                              transform: scale(var(--spirit-peak, 1.0)); }
    }

    /* ===== SECTION: 入力エリア ===== */
    #input-area {
      display: flex;
      gap: 10px;
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      background: var(--sumi);
      border-top: 1px solid rgba(243, 234, 217, 0.1);
      z-index: 100;
      width: 100%;
      flex-shrink: 0;
    }

    #guess-input {
      flex: 1;
      padding: 14px 14px;
      font-size: 1.22rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 500;
      background: rgba(243, 234, 217, 0.05);
      border: 1.5px solid rgba(243, 234, 217, 0.18);
      border-radius: 5px;
      color: var(--washi);
      outline: none;
      text-align: center;
      letter-spacing: 0.18em;
      transition: border-color 0.2s, background 0.2s;
      caret-color: var(--shu);
      min-width: 0;
    }

    #guess-input::placeholder {
      color: rgba(243, 234, 217, 0.22);
      letter-spacing: 0.04em;
      font-size: 0.9rem;
    }

    #guess-input:focus {
      border-color: rgba(243, 234, 217, 0.42);
      background: rgba(243, 234, 217, 0.07);
    }

    #guess-input:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #submit-btn {
      padding: 14px 20px;
      background: var(--shu);
      color: var(--washi);
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.12em;
      cursor: pointer;
      white-space: nowrap;
      min-width: 80px;
      transition: opacity 0.18s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    #submit-btn:hover:not(:disabled) {
      opacity: 0.82;
    }

    #submit-btn:active:not(:disabled) {
      transform: scale(0.94);
    }

    #submit-btn:disabled {
      background: rgba(107, 111, 118, 0.5);
      cursor: not-allowed;
    }

    /* ===== SECTION: メッセージエリア ===== */
    #message-area {
      min-height: 36px;
      text-align: center;
      padding: 7px 18px;
      border-radius: 5px;
      width: 100%;
      max-width: 420px;
      line-height: 1.5;
      letter-spacing: 0.06em;
      font-size: 0.85rem;
    }

    #message-area.error {
      background: rgba(200, 55, 46, 0.12);
      color: #e8807a;
      border: 1px solid rgba(200, 55, 46, 0.28);
    }

    #message-area.info {
      background: rgba(243, 234, 217, 0.05);
      color: rgba(243, 234, 217, 0.55);
      border: 1px solid rgba(243, 234, 217, 0.1);
    }

    #message-area.success {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 1.02rem;
      font-weight: 700;
      background: rgba(200, 55, 46, 0.1);
      color: var(--washi);
      border: 1px solid rgba(200, 55, 46, 0.35);
    }

    #message-area.fail {
      font-family: 'Shippori Mincho B1', serif;
      font-size: 0.97rem;
      font-weight: 700;
      background: rgba(107, 111, 118, 0.12);
      color: rgba(243, 234, 217, 0.65);
      border: 1px solid rgba(107, 111, 118, 0.28);
    }

    /* ===== SECTION: ジャンルヒント ===== */
    #genre-hint {
      display: none;
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--sumiNezumi);
      padding: 5px 16px;
      border-radius: 4px;
      border: 1px dashed rgba(107, 111, 118, 0.28);
      background: rgba(107, 111, 118, 0.05);
      width: 100%;
      max-width: 420px;
    }

    #genre-hint.visible {
      display: block;
      animation: genreHintFadeIn 0.9s ease-out forwards;
    }

    @keyframes genreHintFadeIn {
      0%   { opacity: 0; transform: translateY(-4px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ===== SECTION: フッター・リプレイ ===== */
    footer {
      padding-bottom: 44px;
    }

    #replay-btn {
      display: none;
      padding: 15px 44px;
      background: transparent;
      color: var(--washi);
      border: 1.5px solid rgba(243, 234, 217, 0.3);
      border-radius: 5px;
      font-size: 0.95rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      letter-spacing: 0.16em;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #replay-btn:hover {
      border-color: rgba(243, 234, 217, 0.6);
      background: rgba(243, 234, 217, 0.05);
    }

    #replay-btn:active {
      transform: scale(0.97);
    }

    /* ===== SECTION: 完全正解エフェクト（言霊解放） ===== */

    /* Phase 0: タイル行を横切る筆致ライン（かすれ・滲みを伴う） */
    @keyframes brushLineAnim {
      0%   { transform: scaleX(0);   opacity: 0.92; filter: blur(0.4px); }
      45%  { transform: scaleX(0.7); opacity: 1;    filter: blur(0.2px); }
      70%  { transform: scaleX(1);   opacity: 1;    filter: blur(0.5px); }
      100% { transform: scaleX(1);   opacity: 0;    filter: blur(1.6px); }
    }

    /* Phase 0: 筆致に沿って墨がじわりと滲む */
    @keyframes inkBleedTrailAnim {
      0%   { opacity: 0;   transform: scale(0.3); filter: blur(1px); }
      35%  { opacity: 0.5; transform: scale(1);   filter: blur(2px); }
      100% { opacity: 0;   transform: scale(2.2); filter: blur(7px); }
    }

    /* Phase 0: タイルフラッシュ */
    .cell.correct.perfect-tile-flash {
      animation: tilePerfectFlash 0.32s ease-out forwards;
    }

    @keyframes tilePerfectFlash {
      0%   { transform: scale(1); }
      42%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* Phase 1: 言霊（写真のように揺らめく白い炎）が画面中央へ立ち上る */
    @keyframes kotodamaRiseAnim {
      0%   { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0.26) rotate(-4deg); }
      42%  { opacity: 1; transform: translate(calc(var(--sx) * 0.22), calc(var(--sy) * 0.3 - 30px)) scale(0.92) rotate(2deg); }
      70%  { opacity: 1; transform: translate(0, 12px) scale(1.12) rotate(-1deg); }
      100% { opacity: 1; transform: translate(0, 0)    scale(1)    rotate(0deg); }
    }

    /* Phase 1: 浮遊中、炎全体が呼吸するようにゆらぐ */
    @keyframes kotodamaFlickerAnim {
      0%, 100% { transform: scale(1)    translateY(0); }
      50%      { transform: scale(1.04) translateY(-4px); }
    }

    /* Phase 1: 炎エフェクト用キャンバス（Canvas 2Dパーティクルで白熱コア〜青い炎を描画。詳細はJS側のkotodamaFlameCanvas参照） */
    .kotodama-canvas {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 190%;
      pointer-events: none;
      filter: drop-shadow(0 0 16px rgba(169,220,255,0.5));
    }

    /* Phase 1: 炎が姿を現した瞬間の画面フラッシュ */
    .perfect-screen-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 995;
      mix-blend-mode: screen;
      background: radial-gradient(circle at var(--fx) var(--fy), rgba(253,253,251,0.55) 0%, rgba(169,220,255,0.18) 35%, transparent 65%);
      animation: screenFlashAnim 0.4s ease-out forwards;
    }

    @keyframes screenFlashAnim {
      0%   { opacity: 0; }
      25%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* 炎の出現・お札の着弾に合わせて画面全体が震える */
    @keyframes shellShakeAnim {
      0%   { transform: translate(0, 0); }
      20%  { transform: translate(-4px, 2px); }
      40%  { transform: translate(4px, -2px); }
      60%  { transform: translate(-3px, 1px); }
      80%  { transform: translate(2px, -1px); }
      100% { transform: translate(0, 0); }
    }
    .shell-shake        { animation: shellShakeAnim 0.32s ease-out; }
    .shell-shake-strong  { animation: shellShakeAnim 0.42s ease-out 2; }

    /* Phase 2: 札が勢いよく舞い落ちて言霊に貼りつく */
    @keyframes ofudaDropAnim {
      0%   { opacity: 0; transform: translateY(-70vh) rotate(-14deg) scale(0.8); }
      55%  { opacity: 1; transform: translateY(10px)   rotate(6deg)  scale(1.05); }
      72%  { opacity: 1; transform: translateY(-6px)   rotate(-3deg) scale(0.98); }
      86%  { opacity: 1; transform: translateY(3px)    rotate(1deg)  scale(1.02); }
      100% { opacity: 1; transform: translateY(0)      rotate(0deg)  scale(1); }
    }

    /* Phase 2: 落下の勢いを示す残像（モーションブラー風の帯） */
    .ofuda::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -160%;
      width: 55%;
      height: 160%;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, transparent, rgba(243,234,217,0.5) 80%);
      filter: blur(5px);
      pointer-events: none;
      animation: ofudaTrailFadeAnim 0.4s ease-in forwards;
    }

    @keyframes ofudaTrailFadeAnim {
      0%   { opacity: 0.8; }
      60%  { opacity: 0.4; }
      100% { opacity: 0; }
    }

    /* Phase 2: 着弾の衝撃で散る紙片 */
    @keyframes paperFleckAnim {
      0%   { opacity: 0.95; transform: translate(-50%, -50%) rotate(0deg) scale(1); }
      100% { opacity: 0;    transform: translate(calc(-50% + var(--fx)), calc(-50% + var(--fy))) rotate(var(--fr)) scale(0.4); }
    }

    /* Phase 3: 弾けるように広がる衝撃波 */
    @keyframes shockwaveRingAnim {
      0%   { opacity: 0.9; transform: scale(0.15); border-width: 6px; }
      100% { opacity: 0;   transform: scale(1);    border-width: 0.5px; }
    }

    /* Phase 3: 言霊が一気に霧散していく粒子 */
    @keyframes mistParticleAnim {
      0%   { opacity: 0.9; transform: translate(-50%, -50%) scale(1);   filter: blur(0px); }
      100% { opacity: 0;   transform: translate(calc(-50% + var(--mx)), calc(-50% + var(--my))) scale(0.2); filter: blur(3px); }
    }

    /* Phase 3: 強い光を放って一気に鎮まる言霊本体 */
    @keyframes kotodamaPurifyAnim {
      0%   { opacity: 1; transform: scale(1);   filter: brightness(1); }
      30%  { opacity: 1; transform: scale(1.2); filter: brightness(2.4); }
      100% { opacity: 0; transform: scale(0.4); filter: brightness(3); }
    }

    /* Phase 3: 役目を終えた札が静かに消える */
    @keyframes ofudaFadeOutAnim {
      0%   { opacity: 1; transform: scale(1)    translateY(0); }
      100% { opacity: 0; transform: scale(0.94) translateY(-8px); }
    }

    /* ===== SECTION: スタート画面 ===== */
    #start-screen {
      position: fixed;
      inset: 0;
      background: var(--sumi);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .start-screen-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      width: 100%;
      max-width: 360px;
    }

    .start-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
    }

    .start-label {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-indent: 0.2em;
      color: var(--sumiNezumi);
    }

    #length-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .length-btn {
      flex: 1;

      const available = Math.min(window.innerWidth - padding, 448 - padding);
      const totalGap  = gap * (wordLength - 1);
      const cellSize  = Math.min(maxCell, Math.floor((available - totalGap) / wordLength));

      gridContainer.style.setProperty("--cell-size", cellSize + "px");
      gridContainer.style.setProperty("--gap", gap + "px");

    // ===== SECTION: 判定ロジック =====
    function evaluate(guess, target) {
      const result      = new Array(wordLength).fill("absent");
      const targetUsed  = new Array(wordLength).fill(false);
      const guessUsed   = new Array(wordLength).fill(false);

      for (let i = 0; i < wordLength; i++) {
        if (guess[i] === target[i]) {
          result[i]     = "correct";
          targetUsed[i] = true;
          guessUsed[i]  = true;
        }
      }

      for (let i = 0; i < wordLength; i++) {
        if (guessUsed[i]) continue;
        for (let j = 0; j < wordLength; j++) {
          if (targetUsed[j]) continue;
          if (guess[i] === target[j]) {
            result[i]     = "present";
            targetUsed[j] = true;
            break;
          }
        }
      }

      return result;
    }

    // ===== SECTION: 完全正解エフェクト（言霊解放） =====

    // Phase 1: 青い炎パーティクルの配色（CSS変数から一度だけ取得して使い回す）
    function hexToRgb(hex) {
      const n = parseInt(hex.replace('#', ''), 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }
    const flameRootStyle = getComputedStyle(document.documentElement);
    const FLAME_HONOO     = hexToRgb(flameRootStyle.getPropertyValue('--honoo').trim());
    const FLAME_HONOO_AO  = hexToRgb(flameRootStyle.getPropertyValue('--honooAo').trim());
    const FLAME_HONOO_KON = hexToRgb(flameRootStyle.getPropertyValue('--honooKon').trim());

    function lerpVal(a, b, t) {
      return a + (b - a) * t;
    }

    // Phase 1: 立ち上る火の粉1粒。上昇しながらsin波で揺れ、上昇するほど減速し、白〜水色から青へ色変化する
    class KotodamaFlameParticle {
      constructor(cw, ch) {
        this.cw = cw;
        this.ch = ch;
        this.reset();
      }

      reset() {
        const cw = this.cw, ch = this.ch;
        this.x = cw / 2 + (Math.random() - 0.5) * cw * 0.2;
        this.y = ch * 0.86 + (Math.random() - 0.5) * ch * 0.025;
        // 速度はpx/秒で保持し、フレームレートに依存せず時間で積分する
        this.vx = (Math.random() - 0.5) * cw * 0.16;
        this.vy = -(ch * 0.3 + Math.random() * ch * 0.6);
        this.size = 1.2 + Math.random() * 2.8;
        this.maxLife = 0.8 + Math.random() * 1.3;
        this.life = 1;
        this.age = 0;
        this.wobbleAmp = cw * (0.045 + Math.random() * 0.12);
        this.wobbleSpeed = 1.4 + Math.random() * 2.4;
        this.wobblePhase = Math.random() * Math.PI * 2;
      }

      update(dt) {
        this.age += dt;
        this.life = 1 - this.age / this.maxLife;
        if (this.life <= 0) {
          this.reset();
          return;
        }
        // 上昇するほど減速させる（60fps基準の0.98減衰を秒基準に換算）
        this.vy *= Math.pow(0.98, dt * 60);
        // 上昇するにつれて揺れ幅を広げ、炎の穂先が広がるように見せる
        const spread = 1 + (1 - this.life) * 1.6;
        const wobble = Math.sin(this.age * this.wobbleSpeed + this.wobblePhase) * this.wobbleAmp * spread;
        this.x += (this.vx + wobble) * dt;
        this.y += this.vy * dt;
      }

      draw(ctx) {
        const t = 1 - this.life; // 0(生まれたて)→1(消える直前)
        const r = Math.round(lerpVal(FLAME_HONOO.r, FLAME_HONOO_KON.r, t));
        const g = Math.round(lerpVal(FLAME_HONOO.g, FLAME_HONOO_KON.g, t));
        const b = Math.round(lerpVal(FLAME_HONOO.b, FLAME_HONOO_KON.b, t));
        const alpha = Math.max(this.life, 0) * 0.6;
        const glowSize = this.size * 3.4;
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
        grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha})`);
        grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Phase 1: 白熱コア（radialGradientで白→水色→青の同心円）
    function drawKotodamaCore(ctx, cw, ch, time) {
      const coreX = cw / 2;
      const coreY = ch * 0.86;
      const pulse = 1 + Math.sin(time * 0.004) * 0.06;
      const coreRadius = ch * 0.1 * pulse;
      const grad = ctx.createRadialGradient(coreX, coreY, 0, coreX, coreY, coreRadius);
      grad.addColorStop(0,    '#ffffff');
      grad.addColorStop(0.34, `rgb(${FLAME_HONOO.r}, ${FLAME_HONOO.g}, ${FLAME_HONOO.b})`);
      grad.addColorStop(0.66, `rgb(${FLAME_HONOO_AO.r}, ${FLAME_HONOO_AO.g}, ${FLAME_HONOO_AO.b})`);
      grad.addColorStop(1,    `rgba(${FLAME_HONOO_KON.r}, ${FLAME_HONOO_KON.g}, ${FLAME_HONOO_KON.b}, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(coreX, coreY, coreRadius, 0, Math.PI * 2);
      ctx.fill();
    }

    // Phase 1: Canvas 2Dで青い炎を描画し続け、停止関数を返す（コアは常駐、火の粉はオブジェクトプールで再利用）
    function startKotodamaFlameCanvas(canvas, kotoSize) {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const cw = kotoSize;
      const ch = kotoSize * 1.9;
      canvas.width  = cw * dpr;
      canvas.height = ch * dpr;
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      // スマホでも60fps付近を維持できるよう、粗いポインタ環境ではパーティクル数を抑える
      const isCoarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
      const particleCount = isCoarsePointer ? 100 : 130;
      const particles = [];
      for (let i = 0; i < particleCount; i++) {
        const p = new KotodamaFlameParticle(cw, ch);
        p.age = Math.random() * p.maxLife; // 一斉に生まれ変わらないよう経過時間をずらす
        particles.push(p);
      }

      let lastTime = performance.now();
      let rafId = null;
      let stopped = false;

      function frame(now) {
        if (stopped) return;
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;

        // キャンバスは透明背景のまま使うため、黒で塗りつぶす代わりにdestination-outでアルファを減衰させ
        // トレイル（残像）効果を出す（ゲームUI上に重ねるため、地の黒塗りは使えない）
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.28)';
        ctx.fillRect(0, 0, cw, ch);

        // 加算合成で重なった光が明るくなるようにする
        ctx.globalCompositeOperation = 'lighter';
        drawKotodamaCore(ctx, cw, ch, now);
        for (let i = 0; i < particles.length; i++) {
          particles[i].update(dt);
          particles[i].draw(ctx);
        }

        rafId = requestAnimationFrame(frame);
      }
      rafId = requestAnimationFrame(frame);

      return function stopKotodamaFlame() {
        stopped = true;
        if (rafId !== null) cancelAnimationFrame(rafId);
      };
    }

    function triggerPerfectEffect(word, onComplete) {
      const lastRowIdx = currentAttempt - 1;
      const rowCells   = gridCells[lastRowIdx];

      // Phase 0 の座標は #scroll-area 基準（スクロールしても筆致が回答欄からズレないように）
      const scrollAreaRect = scrollArea.getBoundingClientRect();
      const firstRect  = rowCells[0].getBoundingClientRect();
      const lastRect   = rowCells[wordLength - 1].getBoundingClientRect();
      const rowLeft    = firstRect.left - scrollAreaRect.left + scrollArea.scrollLeft;
      const rowWidth   = lastRect.right - firstRect.left;
      const rowCenterY = (firstRect.top + firstRect.height / 2) - scrollAreaRect.top + scrollArea.scrollTop;

      // Phase 0: タイルフラッシュ + 行を横切る筆致ライン（時間を伸ばし、墨の滲みを添える）
      const sweepMs = 460;
      rowCells.forEach((cell, i) => {
        const d = wordLength <= 1 ? 0 : (i / (wordLength - 1)) * sweepMs;
        setTimeout(() => cell.classList.add('perfect-tile-flash'), d);
      });

      const brushLine = document.createElement('div');
      Object.assign(brushLine.style, {
        position:        'absolute',
        left:            rowLeft + 'px',
        top:             (rowCenterY - 3) + 'px',
        width:           rowWidth + 'px',
        height:          '6px',
        background:      'linear-gradient(90deg, transparent 0%, var(--shu) 18%, var(--kogane) 55%, var(--shu) 85%, transparent 100%)',
        borderRadius:    '3px',
        pointerEvents:   'none',
        zIndex:          '998',
        transformOrigin: 'left center',
        animation:       'brushLineAnim 0.82s cubic-bezier(0.22, 0.5, 0.4, 1) forwards',
      });
      scrollArea.appendChild(brushLine);
      setTimeout(() => brushLine.remove(), 900);

      // 筆致に沿って墨だまりが段階的に滲む（同じく #scroll-area 基準で追随させる）
      const bleedCount = Math.max(wordLength, 3);
      for (let i = 0; i < bleedCount; i++) {
        const t         = i / (bleedCount - 1);
        const bx        = rowLeft + rowWidth * t;
        const delay     = 60 + t * sweepMs * 0.9;
        const bleedSize = 22 + Math.random() * 14;
        setTimeout(() => {
          const bleed = document.createElement('div');
          Object.assign(bleed.style, {
            position:        'absolute',
            left:            (bx - bleedSize / 2) + 'px',
            top:             (rowCenterY - bleedSize / 2) + 'px',
            width:           bleedSize + 'px',
            height:          bleedSize + 'px',
            background:      'radial-gradient(circle, var(--shu) 0%, rgba(200,55,46,0.4) 55%, transparent 78%)',
            borderRadius:    '50%',
            pointerEvents:   'none',
            zIndex:          '996',
            animation:       'inkBleedTrailAnim 0.7s ease-out forwards',
          });
          scrollArea.appendChild(bleed);
          setTimeout(() => bleed.remove(), 720);
        }, delay);
      }

      // Phase 1 以降は画面中央を舞台にした全画面演出（ビューポート基準の固定配置でよい）
      const stageX = window.innerWidth / 2;
      const stageY = window.innerHeight * 0.38;
      const kotoSize = Math.round(Math.min(window.innerWidth * 0.34, window.innerHeight * 0.24, 200));

      setTimeout(() => {
        // 演出開始時点の行の画面位置を改めて取得（浮き上がりの起点にする）
        const originRect = rowCells[0].getBoundingClientRect();
        const originLastRect = rowCells[wordLength - 1].getBoundingClientRect();
        const originX = originRect.left + (originLastRect.right - originRect.left) / 2;
        const originY = originRect.top + originRect.height / 2;

        const kotodama = document.createElement('div');
        kotodama.className = 'kotodama-wrap';
        Object.assign(kotodama.style, {
          position:        'fixed',
          left:            (stageX - kotoSize / 2) + 'px',
          top:             (stageY - kotoSize / 2) + 'px',
          width:           kotoSize + 'px',
          height:          kotoSize + 'px',
          pointerEvents:   'none',
          zIndex:          '997',
          transformOrigin: 'center',
          '--sx':          (originX - stageX) + 'px',
          '--sy':          (originY - stageY) + 'px',
          animation:       'kotodamaRiseAnim 0.68s cubic-bezier(0.22, 0.6, 0.32, 1) forwards, kotodamaFlickerAnim 1.6s ease-in-out 0.68s infinite',
        });

        // 青い炎はCanvas 2Dパーティクルで描画する（コア+舞い上がる火の粉）
        const flameCanvas = document.createElement('canvas');
        flameCanvas.className = 'kotodama-canvas';
        kotodama.appendChild(flameCanvas);

        document.body.appendChild(kotodama);

        const stopKotodamaFlame = startKotodamaFlameCanvas(flameCanvas, kotoSize);

        // 出現の瞬間、画面フラッシュと軽い揺れで勢いを添える
        const flash = document.createElement('div');
        flash.className = 'perfect-screen-flash';
        Object.assign(flash.style, { '--fx': stageX + 'px', '--fy': stageY + 'px' });
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 420);

        appShellEl.classList.add('shell-shake');
        setTimeout(() => appShellEl.classList.remove('shell-shake'), 340);

        // Phase 2: 浮遊の後、札が勢いよく舞い落ちて言霊に貼りつく
        const ofudaW = Math.round(kotoSize * 0.52);
        const ofudaH = Math.round(kotoSize * 0.98);
        setTimeout(() => {
          const ofuda = document.createElement('div');
          ofuda.className = 'ofuda';
          Object.assign(ofuda.style, {
            position:        'fixed',
            left:            (stageX - ofudaW / 2) + 'px',
            top:             (stageY - ofudaH / 2) + 'px',
            width:           ofudaW + 'px',
            height:          ofudaH + 'px',
            background:      'var(--washi)',
            border:          '2px solid var(--shu)',
            borderRadius:    '2px',
            boxShadow:       'inset 0 0 0 3px rgba(200,55,46,0.12), 0 10px 26px rgba(0,0,0,0.5)',
            pointerEvents:   'none',
            zIndex:          '999',
            transformOrigin: 'center top',
            animation:       'ofudaDropAnim 0.46s cubic-bezier(0.5, 0, 0.75, 0.15) forwards',
          });
          const stripe = document.createElement('div');
          Object.assign(stripe.style, {
            position:   'absolute',
            left:        '50%',
            top:         '12%',
            width:       '2px',
            height:      '76%',
            background:  'var(--shu)',
            transform:   'translateX(-50%)',
            opacity:     '0.55',
          });
          ofuda.appendChild(stripe);
          document.body.appendChild(ofuda);

          // 着弾の瞬間、強めの揺れと紙片の飛散で衝撃を演出する
          setTimeout(() => {
            appShellEl.classList.add('shell-shake-strong');
            setTimeout(() => appShellEl.classList.remove('shell-shake-strong'), 460);

            const fleckCount = 7;
            for (let i = 0; i < fleckCount; i++) {
              const angle = (i / fleckCount) * Math.PI * 2 + Math.random() * 0.5;
              const dist  = 30 + Math.random() * 40;
              const fleck = document.createElement('div');
              Object.assign(fleck.style, {
                position:      'fixed',
                left:          stageX + 'px',
                top:           stageY + 'px',
                width:         (4 + Math.random() * 4) + 'px',
                height:        (6 + Math.random() * 6) + 'px',
                background:    'var(--washi)',
                border:        '1px solid var(--shu)',
                pointerEvents: 'none',
                zIndex:        '1000',
                '--fx':        (Math.cos(angle) * dist) + 'px',
                '--fy':        (Math.sin(angle) * dist - 10) + 'px',
                '--fr':        (Math.random() * 260 - 130) + 'deg',
                animation:     'paperFleckAnim 0.5s ease-out forwards',
              });
              document.body.appendChild(fleck);
              setTimeout(() => fleck.remove(), 520);
            }
          }, 250);

          // Phase 3: 貼りついた直後、衝撃波と共に言霊が霧散して鎮まる
          setTimeout(() => {
            stopKotodamaFlame();

            [0, 90].forEach((delay, idx) => {
              setTimeout(() => {
                const ringSize = kotoSize * (2.6 + idx * 1.1);
                const ring = document.createElement('div');
                Object.assign(ring.style, {
                  position:     'fixed',
                  left:         (stageX - ringSize / 2) + 'px',
                  top:          (stageY - ringSize / 2) + 'px',
                  width:        ringSize + 'px',
                  height:       ringSize + 'px',
                  borderRadius: '50%',
                  border:       '6px solid ' + (idx === 0 ? 'var(--honoo)' : 'var(--honooAo)'),
                  boxSizing:    'border-box',
                  pointerEvents:'none',
                  zIndex:       '1000',
                  animation:    'shockwaveRingAnim 0.6s ease-out forwards',
                });
                document.body.appendChild(ring);
                setTimeout(() => ring.remove(), 650);
              }, delay);
            });

            const mistCount = 14;
            for (let i = 0; i < mistCount; i++) {
              const angle = Math.random() * Math.PI * 2;
              const dist  = kotoSize * (0.8 + Math.random() * 1.4);
              const size  = kotoSize * (0.18 + Math.random() * 0.22);
              const mist  = document.createElement('div');
              Object.assign(mist.style, {
                position:     'fixed',
                left:         stageX + 'px',
                top:          stageY + 'px',
                width:        size + 'px',
                height:       size + 'px',
                borderRadius: '50%',
                background:   'radial-gradient(circle, rgba(253,253,251,0.85) 0%, rgba(169,220,255,0.4) 55%, transparent 78%)',
                pointerEvents:'none',
                zIndex:       '1000',
                '--mx':       (Math.cos(angle) * dist) + 'px',
                '--my':       (Math.sin(angle) * dist) + 'px',
                animation:    'mistParticleAnim ' + (0.55 + Math.random() * 0.3) + 's ease-out forwards',
              });
              document.body.appendChild(mist);
              setTimeout(() => mist.remove(), 950);
            }

            kotodama.style.animation = 'kotodamaPurifyAnim 0.4s ease-in forwards';

            setTimeout(() => {
              ofuda.style.animation = 'ofudaFadeOutAnim 0.4s ease-in forwards';
              setTimeout(() => {
                kotodama.remove();
                ofuda.remove();
              }, 420);
            }, 220);
          }, 480);
        }, 700);
      }, 760);

      setTimeout(onComplete, 3050);
    }

    // ===== SECTION: 推測処理 =====
    function submitGuess() {
      if (gameOver) return;

      const guess = guessInput.value.trim();
      guessInput.value = "";
      updatePreview();

      if (guess.length !== wordLength) {
        showMessage(`${wordLength}文字で入力してください。（現在 ${guess.length} 文字）`, "error");
        guessInput.focus();
        return;
      }

      if (!isHiragana(guess)) {
        showMessage("ひらがなのみで入力してください。", "error");
        guessInput.focus();
        return;
      }

      // テストモード: 1回目の回答は必ず全正解として判定
      const result = (isTestMode && currentAttempt === 0)
        ? new Array(wordLength).fill("correct")
        : evaluate(guess, targetWord);
      colorRow(currentAttempt, guess, result);
      currentAttempt++;

      const revealEnd = (wordLength - 1) * 130 + 300;

      if (result.every(r => r === "correct")) {
        gameOver = true;
        const tries = currentAttempt;
        setTimeout(() => {
          triggerPerfectEffect(targetWord, () => {
            showMessage(`霊力を解き明かした！「${targetWord}」を ${tries} 回で見抜いた。`, "success");
            endGame();
          });
        }, revealEnd);
        return;
      }

      if (currentAttempt >= maxAttempts) {
        gameOver = true;
        setTimeout(() => {
          showMessage(`言霊が逃げた……正解は「${targetWord}」。`, "fail");
          endGame();
        }, revealEnd);
        return;
      }

      setActiveRow(currentAttempt);
      const remaining = maxAttempts - currentAttempt;
      showMessage(`残り ${remaining} 回`, "info");

      // 試行回数が最大の半分に達した時点でジャンルヒントを1回だけ表示
      if (!genreHintShown && currentAttempt === Math.ceil(maxAttempts / 2)) {
        genreHintShown = true;
        setTimeout(() => showGenreHint(), revealEnd);
      }

      guessInput.focus();
    }

    // ===== SECTION: ゲーム終了 =====
    function endGame() {
      submitBtn.disabled      = true;
      guessInput.disabled     = true;
      replayBtn.style.display = "inline-block";
      lastWord = targetWord;
    }

    // ===== SECTION: ゲーム開始 =====
    function startGame(testMode = false) {
      isTestMode      = testMode;
      targetWord      = pickWord();
      wordLength      = WORDS_WITH_GENRE[targetWord].length;
      currentGenre    = WORDS_WITH_GENRE[targetWord].genre;
      maxAttempts     = wordLength + 7;
      currentAttempt  = 0;
      gameOver        = false;

      genreHintShown  = false;
      genreHintEl.textContent = "";
      genreHintEl.classList.remove("visible");

      guessInput.disabled     = false;
      guessInput.value        = "";
      submitBtn.disabled      = false;
      replayBtn.style.display = "none";

      if (isTestMode) {
        testModeBanner.classList.add("visible");
      } else {
        testModeBanner.classList.remove("visible");
      }

      buildGrid();
      showMessage(`${wordLength}文字の言霊を当てよ。（最大 ${maxAttempts} 回）`, "info");
      guessInput.focus();
    }

    // ===== SECTION: スタート画面制御 =====
    function showStartScreen() {
      startScreen.style.display = "flex";
    }

    function hideStartScreen() {
      startScreen.style.display = "none";
    }

    lengthBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        lengthBtns.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedLength = parseInt(btn.dataset.length);
      });
    });

    gameStartBtn.addEventListener("click", () => {
      hideStartScreen();
      startGame(false);
    });

    testStartBtn.addEventListener("click", () => {
      hideStartScreen();
      startGame(true);
    });

    // ===== SECTION: イベントリスナー登録 =====
    submitBtn.addEventListener("click", submitGuess);

    guessInput.addEventListener("input", updatePreview);

    guessInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        submitGuess();
      }
    });

    replayBtn.addEventListener("click", showStartScreen);

    // ===== SECTION: 初回起動・iOS対応 =====
    showStartScreen();

    // --- サブ: キーボード表示時のビジュアルビューポート追従（iOS対応） ---
    const appShell = document.getElementById("app-shell");

    function adjustForKeyboard() {
      if (!window.visualViewport) return;
      const vv = window.visualViewport;
      appShell.style.height = vv.height + "px";
      appShell.style.top = (vv.offsetTop || 0) + "px";
    }

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", adjustForKeyboard);
      window.visualViewport.addEventListener("scroll", adjustForKeyboard);
    }
    adjustForKeyboard();

    // キーボード表示後にアクティブ行をスクロールで見えるようにする
    guessInput.addEventListener("focus", () => {
      setTimeout(() => {
        if (gridCells[currentAttempt]) {
          gridCells[currentAttempt][0].scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }, 350);
    });
  </script>
</body>
