<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>青い火の玉エフェクト デモ</title>
<style>
  /* ===== SECTION: ベース・レイアウト ===== */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }

  /* ===== SECTION: キャンバス ===== */
  #flame-canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ===== SECTION: 情報表示 ===== */
  #fps-counter {
    position: fixed;
    top: 10px;
    left: 12px;
    color: #9fd8ff;
    font-family: monospace;
    font-size: 13px;
    opacity: 0.7;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>

<!-- ===== SECTION: キャンバス ===== -->
<canvas id="flame-canvas"></canvas>
<div id="fps-counter">FPS: --</div>

<script>
  // ===== SECTION: キャンバス初期化 =====
  const canvas = document.getElementById('flame-canvas');
  const ctx = canvas.getContext('2d');

  let dpr = Math.min(window.devicePixelRatio || 1, 2);
  let width = 0;
  let height = 0;

  function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ===== SECTION: パーティクルクラス =====
  // 上昇しながらsin波で左右に揺れる火の粉。寿命が尽きたらコア付近へ再配置して使い回す。
  class Particle {
    constructor() {
      this.reset();
    }

    reset() {
      const coreX = width / 2;
      const coreY = height * 0.86;

      this.x = coreX + (Math.random() - 0.5) * 18;
      this.y = coreY + (Math.random() - 0.5) * 10;

      // 速度は px/秒 で保持し、フレームレートに依存せず時間で積分する
      this.vx = (Math.random() - 0.5) * 10;
      this.vy = -(90 + Math.random() * 190);

      this.size = 1.3 + Math.random() * 3;
      this.maxLife = 1.0 + Math.random() * 1.6; // 秒
      this.life = 1; // 1 -> 0 に減っていく残寿命割合
      this.age = 0;

      this.wobbleAmp = 8 + Math.random() * 22;
      this.wobbleSpeed = 1.2 + Math.random() * 2.2;
      this.wobblePhase = Math.random() * Math.PI * 2;
    }

    update(dt) {
      this.age += dt;
      this.life = 1 - this.age / this.maxLife;

      if (this.life <= 0) {
        this.reset();
        return;
      }

      // 上昇するほど減速させる（60fps基準の0.98減衰を秒基準に換算し、フレームレートに依存させない）
      this.vy *= Math.pow(0.98, dt * 60);

      // 上昇するにつれて揺れ幅を広げ、炎の穂先が広がるように見せる
      const spread = 1 + (1 - this.life) * 1.6;
      const wobble = Math.sin(this.age * this.wobbleSpeed + this.wobblePhase) * this.wobbleAmp * spread;

      this.x += (this.vx + wobble) * dt;
      this.y += this.vy * dt;
    }

    draw(ctx) {
      // 下部(life=1)は白〜水色、上部(life=0付近)は青系へグラデーション変化
      const t = 1 - this.life; // 0(生まれたて) -> 1(消える直前)
      const r = Math.round(lerp(255, 40, t));
      const g = Math.round(lerp(250, 120, t));
      const b = 255;
      const alpha = Math.max(this.life, 0) * 0.55;

      const glowSize = this.size * 3.4;
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
      grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha})`);
      grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  // ===== SECTION: パーティクルプール管理 =====
  // スマホでも60fps付近を維持できるよう上限を設ける
  const isCoarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
  const PARTICLE_COUNT = isCoarsePointer ? 100 : 140;

  const particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = new Particle();
    // 初期状態はランダムな経過時間から始め、一斉に生まれ変わらないようにする
    p.age = Math.random() * p.maxLife;
    particles.push(p);
  }

  // ===== SECTION: コア（白熱球）描画 =====
  function drawCore(time) {
    const coreX = width / 2;
    const coreY = height * 0.86;
    const pulse = 1 + Math.sin(time * 0.004) * 0.06;
    const coreRadius = Math.min(width, height) * 0.055 * pulse;

    const grad = ctx.createRadialGradient(coreX, coreY, 0, coreX, coreY, coreRadius);
    grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
    grad.addColorStop(0.35, 'rgba(210, 245, 255, 0.9)');
    grad.addColorStop(0.65, 'rgba(90, 170, 255, 0.55)');
    grad.addColorStop(1, 'rgba(40, 90, 255, 0)');

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(coreX, coreY, coreRadius, 0, Math.PI * 2);
    ctx.fill();
  }

  // ===== SECTION: アニメーションループ =====
  let lastTime = performance.now();
  let fpsAccum = 0;
  let fpsFrames = 0;
  let fpsTimer = 0;
  const fpsEl = document.getElementById('fps-counter');

  function frame(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    // 前フレームを薄く塗りつぶし、トレイル（残像）効果を出す
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
    ctx.fillRect(0, 0, width, height);

    // 加算合成で重なった光が明るくなるようにする
    ctx.globalCompositeOperation = 'lighter';

    drawCore(now);

    for (let i = 0; i < particles.length; i++) {
      particles[i].update(dt);
      particles[i].draw(ctx);
    }

    // FPS計測（1秒ごとに更新）
    fpsAccum += 1 / dt;
    fpsFrames++;
    fpsTimer += dt;
    if (fpsTimer >= 1) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsAccum / fpsFrames);
      fpsAccum = 0;
      fpsFrames = 0;
      fpsTimer = 0;
    }

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
</script>
</body>
</html>
